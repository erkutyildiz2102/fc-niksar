<html lang="de">
<head>

<style>
:root{--primary:#0A2540;--accent:#fff;--amber:#F59E0B}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F0F4F8;margin:0;min-height:100vh;overflow-x:hidden}
@keyframes spin{to{transform:rotate(360deg)}}
#splash,#profileSetup{position:fixed;inset:0;background:#fff;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
#app{display:none;flex-direction:column;min-height:100vh;padding-bottom:80px;padding-top:calc(56px + env(safe-area-inset-top))}
.card{background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.08);overflow:hidden}
.card-dark{background:var(--primary);color:#fff;border-radius:16px;overflow:hidden}
.card-amber{background:var(--amber);border-radius:16px;overflow:hidden}
#bottomNav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e5e7eb;padding:8px 0 calc(8px + env(safe-area-inset-bottom));display:flex;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;cursor:pointer;padding:4px;position:relative;color:#9CA3AF;font-size:11px;transition:color .2s;touch-action:manipulation;-webkit-user-select:none;user-select:none}
.nav-btn.active{color:var(--primary)}
.nav-btn i{font-size:20px}
.badge{position:absolute;top:2px;right:calc(50% - 18px);background:#EF4444;color:#fff;border-radius:9px;font-size:10px;font-weight:700;padding:1px 5px;min-width:16px;text-align:center;line-height:14px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end}
.modal-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:20px}
.modal-handle{width:40px;height:4px;background:#e5e7eb;border-radius:2px;margin:0 auto 16px}
.rsvp-btn{flex:1;padding:8px 4px;border-radius:10px;border:2px solid transparent;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;background:#f3f4f6;color:#374151}
.rsvp-btn.go{background:#D1FAE5;color:#065F46;border-color:#10B981}
.rsvp-btn.opn{background:#FEF3C7;color:#92400E;border-color:#F59E0B}
.rsvp-btn.no{background:#FEE2E2;color:#991B1B;border-color:#EF4444}
.player-chip{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px;border-radius:12px;border:2px solid #e5e7eb;cursor:pointer;background:#f9fafb;transition:all .2s}
.player-chip.selected{border-color:var(--primary);background:#EEF2FF}
.avatar{background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;width:48px;height:48px;border-radius:50%}
.avatar-lg{width:52px;height:52px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px}
.stat-bar{height:6px;border-radius:3px;background:#e5e7eb;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:3px;background:var(--primary);transition:width .6s}
.training-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:2px}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;margin:0 auto}
.pin-btn{padding:16px;border:2px solid #e5e7eb;border-radius:12px;background:#fff;font-size:20px;font-weight:600;cursor:pointer;transition:all .15s}
.pin-btn:active{background:#f3f4f6;transform:scale(.96)}
.profile-strip{background:linear-gradient(135deg,var(--primary),#1a3a5c);color:#fff;padding:16px;border-radius:16px;margin:12px 12px 0}
#offlineBanner{display:none;position:fixed;top:0;left:0;right:0;background:#EF4444;color:#fff;text-align:center;padding:8px;font-size:13px;font-weight:600;z-index:500}
#loadingOverlay{position:fixed;inset:0;background:var(--primary);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;color:#fff}
.page{display:none;flex-direction:column;gap:12px;padding:12px}
.page.active{display:flex}
/* WhatsApp-style chat */
.wa-mine{background:#D9FDD3;color:#1f2937;border-radius:18px 18px 4px 18px;box-shadow:0 1px 2px rgba(0,0,0,.12);max-width:72vw}
.wa-other{background:#fff;color:#1f2937;border-radius:18px 18px 18px 4px;box-shadow:0 1px 2px rgba(0,0,0,.12);max-width:72vw}
.wa-date-sep{text-align:center;margin:8px 0}
.wa-date-sep span{background:rgba(255,255,255,.85);color:#667781;font-size:12px;font-weight:600;padding:4px 12px;border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,.1)}
.wa-file{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:rgba(0,0,0,.06);min-width:180px;cursor:pointer}
.wa-input-bar{background:#F0F2F5;padding:8px 10px calc(8px + env(safe-area-inset-bottom));display:flex;gap:6px;align-items:flex-end;flex-shrink:0;transition:padding .1s}
.wa-emoji-grid{display:none;background:#fff;border-top:1px solid #e5e7eb;padding:10px;flex-shrink:0}
.wa-emoji-grid.open{display:block}
/* legacy - keep for other pages */
.msg-bubble{max-width:72%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.4;word-break:break-word}
.msg-mine{background:var(--primary);color:#fff;border-bottom-right-radius:4px;align-self:flex-end}
.msg-other{background:#fff;color:#1f2937;border-bottom-left-radius:4px;align-self:flex-start}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.photo-thumb{aspect-ratio:1;object-fit:cover;cursor:pointer;width:100%}
.trainer-tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:10px 12px 6px}
.ttab{padding:8px 4px;border-radius:12px;border:none;background:#e5e7eb;color:#374151;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:3px;line-height:1.2}
.ttab i{font-size:16px}
.ttab.active{background:var(--primary);color:#fff}
.att-btn{width:32px;height:32px;border-radius:50%;border:2px solid #e5e7eb;background:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.att-btn.yes{background:#D1FAE5;border-color:#10B981}
.att-btn.opn{background:#FEF3C7;border-color:#F59E0B}
.att-btn.no{background:#FEE2E2;border-color:#EF4444}
.squad-card{position:relative;cursor:pointer;border-radius:12px;overflow:hidden;background:#fff;border:2px solid #e5e7eb;text-align:center;padding:8px}
.squad-card.in-squad{border-color:#10B981}
.countdown-bubble{background:rgba(255,255,255,.2);border-radius:10px;padding:4px 10px;font-size:12px;font-weight:700;display:inline-block}
.input-field{width:100%;padding:12px;border:2px solid #e5e7eb;border-radius:10px;font-size:15px;transition:border-color .2s;background:#fff}
.input-field:focus{border-color:var(--primary);outline:none}
.btn-primary{background:var(--primary);color:#fff;border:none;padding:12px 24px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;width:100%;transition:opacity .2s;display:block;text-align:center}
.btn-primary:active{opacity:.85}
.btn-sm{padding:6px 14px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer}
.section-title{font-size:13px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.05em;padding:0 4px}
.new-tag{background:#EF4444;color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px}
/* Event Slider */
.event-slider{display:flex;overflow-x:auto;overflow-y:visible;gap:12px;padding:0 16px 16px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.event-slider::-webkit-scrollbar{display:none}
.event-slide{width:calc(100vw - 48px);max-width:420px;scroll-snap-align:start;border-radius:18px;overflow:hidden;flex-shrink:0;box-sizing:border-box}
/* New event banner */
@keyframes slideDown{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideUp{from{transform:translateY(0);opacity:1}to{transform:translateY(-100%);opacity:0}}
#chatPage{display:none;flex-direction:column;position:fixed;left:0;right:0;top:0;height:100svh;background:#ECE5DD;z-index:100;overflow:hidden}
#chatPage.active{display:flex}
#chatPageHeader{flex-shrink:0;background:#0A2540;display:flex;align-items:center;gap:12px;padding:max(env(safe-area-inset-top),14px) 16px 12px}
#chatMessages{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:6px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.wa-input-bar{flex-shrink:0}
</style>
</head>
<body>

<div id="offlineBanner"><i class="fa fa-wifi-slash"></i> Keine Verbindung – Offline-Modus</div>

<div id="loadingOverlay">
  <div style="font-size:56px;margin-bottom:16px">⚽</div>
  <div style="font-size:22px;font-weight:800;letter-spacing:2px">FC NIKSAR</div>

<div id="splash" style="background:linear-gradient(160deg,#0A2540 0%,#1a4a8a 60%,#2563c4 100%);justify-content:center;align-items:center;padding:0;overflow:hidden">

  <!-- Hintergrund-Kreise -->
  <div style="position:absolute;width:420px;height:420px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.07);top:50%;left:50%;transform:translate(-50%,-50%)"></div>
  <div style="position:absolute;width:280px;height:280px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.1);top:50%;left:50%;transform:translate(-50%,-50%)"></div>

    <div style="width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,0.12);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(0,0,0,0.25),0 0 0 1px rgba(255,255,255,0.15)">
      <img id="splashLogo" src="" style="display:none;width:80px;height:80px;object-fit:contain;border-radius:8px">
      <span id="splashLogoPlaceholder" style="font-size:56px">⚽</span>
    </div>
    <div style="margin-top:22px;font-size:30px;font-weight:900;color:#fff;letter-spacing:5px;text-shadow:0 2px 16px rgba(0,0,0,0.3)">FC NIKSAR</div>
    <div style="font-size:12px;color:rgba(255,255,255,0.6);margin-top:7px;font-weight:500;letter-spacing:2px">F1 · U9 · SAISON 26/27</div>

</div>
<style>
</style>

<div id="profileSetup" style="display:none;background:#fff;overflow-y:auto;justify-content:flex-start;align-items:center;min-height:100vh">
  <div style="width:100%;max-width:420px;padding:max(60px, 12vh) 24px 40px;display:flex;flex-direction:column;gap:16px;box-sizing:border-box">

</div>

<script>
// ---- Firebase Init ----
const firebaseConfig = {
  apiKey: "AIzaSyBaPNv38qSG9tBJVOleyxtakMD6HIU9dEs",
  authDomain: "fc-niksar.firebaseapp.com",
  databaseURL: "https://fc-niksar-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "fc-niksar",
  storageBucket: "fc-niksar.firebasestorage.app",
  messagingSenderId: "798194127840",
  appId: "1:798194127840:web:d7a5d7c0cc49994871d185"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const PUSH_API_URL = 'https://fc-niksar.vercel.app/api/send-push';
const VAPID_PUBLIC_KEY = 'BD7KzD1Vb5RNn6Eds2pIAkcultievN2HLauN0VE5yfUIhg_secZStzmCZ1LNEd-swnK_kIQLj4ezLToch0XPxcU';

// ---- Helpers ----
const LS = k => localStorage.getItem('fcniksar_' + k);
const LSset = (k, v) => localStorage.setItem('fcniksar_' + k, typeof v === 'string' ? v : JSON.stringify(v));
const toArr = val => Object.entries(val || {}).map(([id, v]) => ({ ...v, id }));
const escHtml = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmt = d => { try { return new Date(d).toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit'}); } catch(e){ return d; }};
const fmtFull = d => { try { return new Date(d).toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long'}); } catch(e){ return d; }};
const isNew = ts => ts && (Date.now() - ts) < 7200000; // 2 Stunden
const countdown = ms => {
  const diff = ms - Date.now();
  if(diff <= 0) return {n:'Heute', u:''};
  const d = Math.floor(diff/86400000);
  if(d === 0) return {n:'Heute', u:''};
  if(d === 1) return {n:'Morgen', u:''};
  return {n:d, u:'Tage'};
};

// ---- State ----
const STATE = { players:[], trainings:[], games:[], chat:[], photos:[], config:[], absences:[] };
let currentPage = 'home';
let trainerLoggedIn = LS('trainerLoggedIn') === 'true';
let selectedSetupPlayer = null;
let trainerTab = 'spieler';
let chatName = LS('chatName') || '';
let chatInputWasFocused = false;
let lastChatRead = parseInt(LS('lastChatRead') || '0');
let prevTrainingCount = -1;
let prevGameCount = -1;

// ---- PWA Manifest ----
const DEFAULT_ICON = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Ccircle cx='96' cy='96' r='96' fill='%230A2540'/%3E%3Ctext x='96' y='130' text-anchor='middle' font-size='100'%3E%E2%9A%BD%3C/text%3E%3C/svg%3E";

function setPWAManifest(iconSrc) {
  const m = {
    name:'FC Niksar F1/U9', short_name:'FC Niksar', theme_color:'#0A2540',
    background_color:'#0A2540', display:'standalone', start_url:'./',
    icons:[
      {src: iconSrc, sizes:'192x192', type:'image/png', purpose:'any maskable'},
      {src: iconSrc, sizes:'512x512', type:'image/png', purpose:'any maskable'}
    ]
  };
  // Remove old manifest link
  document.querySelectorAll('link[rel="manifest"]').forEach(l => l.remove());
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = URL.createObjectURL(new Blob([JSON.stringify(m)],{type:'application/manifest+json'}));
  document.head.appendChild(link);
  // Update apple-touch-icon
  let ai = document.querySelector('link[rel="apple-touch-icon"]');
  if(!ai){ ai = document.createElement('link'); ai.rel='apple-touch-icon'; document.head.appendChild(ai); }
  ai.href = iconSrc;
}

// ---- Service Worker ----
// App-Version – bei jeder Änderung hochzählen → erzwingt Update
const APP_VERSION = '1.5';

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/fc-niksar/sw.js').then(reg => {

    // Neue Version gefunden → Banner anzeigen statt automatisch neu laden
    reg.addEventListener('updatefound', () => {
      const newSW = reg.installing;
      newSW.addEventListener('statechange', () => {
        if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
          showUpdateBanner(newSW);
        }
      });
    });

    // Alle 30 Minuten + bei Sichtbarkeit auf Updates prüfen
    setInterval(() => reg.update(), 30 * 60 * 1000);
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') reg.update();
    });

  }).catch(() => {});

  // Nach SKIP_WAITING: Seite neu laden
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (!refreshing) { refreshing = true; window.location.reload(); }
  });
}

}

// ---- Firebase Listeners ----
function initListeners() {
  db.ref('/players').on('value', s => { STATE.players = toArr(s.val()).sort((a,b)=>(parseInt(a.number)||999)-(parseInt(b.number)||999)); onDataChange(); });
  db.ref('/trainings').on('value', s => {
    const arr = toArr(s.val()).sort((a,b)=>new Date(a.date)-new Date(b.date));
    if(prevTrainingCount >= 0 && arr.length > prevTrainingCount) {
      const n = arr.find(t=>(Date.now()-(t.createdAt||0))<15000);
      if(n) showEventBanner('🏃 Neues Training eingetragen', `${fmtFull(n.date)} · ${n.time||'?'} Uhr · ${n.location||''}`, '#0A2540');
    }
    prevTrainingCount = arr.length;
    STATE.trainings = arr; onDataChange();
  });
  db.ref('/games').on('value', s => {
    const arr = toArr(s.val()).sort((a,b)=>new Date(a.date)-new Date(b.date));
    if(prevGameCount >= 0 && arr.length > prevGameCount) {
      const n = arr.find(g=>(Date.now()-(g.createdAt||0))<15000);
      if(n) showEventBanner('⚽ Neues Spiel eingetragen', `${n.opponent||'?'} · ${fmtFull(n.date)}`, '#B45309');
    }
    prevGameCount = arr.length;
    STATE.games = arr; onDataChange();
  });
  db.ref('/absences').on('value', s => { STATE.absences = toArr(s.val()); onDataChange(); });
  db.ref('/polls').on('value', s => { STATE.polls = toArr(s.val()); onDataChange(); });
  db.ref('/chat').on('value', s => {
    STATE.chat = toArr(s.val()).sort((a,b) => (a.ts||0) - (b.ts||0));
    if (currentPage === 'chat' && document.getElementById('chatMessages')) {
      appendNewChatMessages();
    } else {
      renderChat();
    }
    updateChatBadge();
  });
  db.ref('/photos').on('value', s => { STATE.photos = toArr(s.val()).sort((a,b) => (b.ts||0)-(a.ts||0)); if(currentPage==='galerie') renderGalerie(); });
  db.ref('/config').on('value', s => {
    STATE.config = s.val() || {};
    applyLogo(STATE.config.logo);
    if(currentPage==='trainer') renderTrainer();
  });
  db.ref('.info/connected').on('value', s => {
    document.getElementById('offlineBanner').style.display = s.val() ? 'none' : 'block';
  });
}

// ---- Init ----
document.addEventListener('DOMContentLoaded', () => {
  initListeners();
  const hasProfile = !!getProfile();
  const splashDelay = hasProfile ? 0 : 400;
  const autoAdvance = hasProfile ? 1200 : 2200;

  setTimeout(() => {
    document.getElementById('loadingOverlay').style.display = 'none';
    const splash = document.getElementById('splash');
    const inner  = document.getElementById('splashInner');
    splash.style.display = 'flex';
    // Logo + Glow + Ladebalken animieren
    requestAnimationFrame(() => requestAnimationFrame(() => {
      if (inner) { inner.style.opacity = '1'; inner.style.transform = 'scale(1)'; }
      const glow = document.getElementById('splashGlow');
      if (glow) glow.style.transform = 'translate(-50%,-50%) scale(1)';
      setTimeout(() => {
        const bar = document.getElementById('splashBar');
        if (bar) bar.style.width = '100%';
      }, 200);
    }));
    const duration = hasProfile ? 1800 : 2600;
    setTimeout(afterSplash, duration);
  }, 300);
  // Push automatisch aktivieren/wiederherstellen bei jedem Start
  autoSetupPush();
  // Service Worker sofort auf Updates prüfen und sofort aktivieren
  if ('serviceWorker' in navigator) {
    // Wenn neuer SW übernimmt → Seite neu laden + Toast anzeigen
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      sessionStorage.setItem('swUpdated', '1');
      window.location.reload();
    });
    activateSWUpdate();
  }
  // Nach SW-Update Toast anzeigen
  if (sessionStorage.getItem('swUpdated')) {
    sessionStorage.removeItem('swUpdated');
    setTimeout(() => showToast('✅ App aktualisiert'), 1000);
  }

  // Push-Benachrichtigung angeklickt → Seite aus URL-Parameter lesen
  const urlPage = new URLSearchParams(window.location.search).get('page');
  if (urlPage) {
    // URL sauber halten (ohne ?page=...)
    history.replaceState(null, '', window.location.pathname);
    setTimeout(() => navTap(urlPage), 800);
  }

  // Push-Benachrichtigung angeklickt während App offen war → postMessage vom SW
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.addEventListener('message', e => {
      if (e.data?.type === 'NAVIGATE' && e.data.url) {
        const p = new URL(e.data.url).searchParams.get('page');
        if (p) navTap(p);
      }
    });
  }
});

function activateSWUpdate() {
  if (!('serviceWorker' in navigator)) return;
  navigator.serviceWorker.ready.then(reg => {
    // Sofort prüfen ob neue Version wartet
    if (reg.waiting) {
      reg.waiting.postMessage({ type: 'SKIP_WAITING' });
      return;
    }
    // Nach Update suchen
    reg.update().catch(() => {});
    // Wenn neue Version gefunden wird → sofort aktivieren
    reg.addEventListener('updatefound', () => {
      const sw = reg.installing;
      if (!sw) return;
      sw.addEventListener('statechange', () => {
        if (sw.state === 'installed' && navigator.serviceWorker.controller) {
          sw.postMessage({ type: 'SKIP_WAITING' });
        }
      });
    });
  }).catch(() => {});
}

function fixChatHeight() {
  const chat = document.getElementById('chatPage');
  if (!chat || currentPage !== 'chat') return;
  const vv = window.visualViewport;
  // Exakt den sichtbaren Bereich einnehmen – verhindert grauer Bereich wenn Tastatur offen (iOS)
  const top = vv ? vv.offsetTop : 0;
  const h   = vv ? vv.height   : window.innerHeight;
  chat.style.top    = top + 'px';
  chat.style.height = h + 'px';
  chat.style.bottom = 'auto';
  // Wenn Tastatur offen: safe-area-inset-bottom entfernen (kein Home-Indicator sichtbar)
  // Sonst: normales Padding mit safe-area für Home-Indicator
  const inputBar = document.querySelector('.wa-input-bar');
  if (inputBar) {
    const keyboardOpen = vv && vv.height < window.innerHeight * 0.75;
    // Tastatur offen: kein extra Padding (Keyboard liegt direkt darunter, kein Home-Indicator)
    inputBar.style.paddingBottom = keyboardOpen ? '0px' : '';
  }
  // Nach Layout-Änderung (z.B. Keyboard öffnet) immer nach unten scrollen
  const msgs = document.getElementById('chatMessages');
  if (msgs) requestAnimationFrame(() => { msgs.scrollTop = msgs.scrollHeight; });
}

function fixChatHeightDelayed() {
  // Sofort + nochmal nach Keyboard-Animation (iOS braucht ~300ms)
  fixChatHeight();
  setTimeout(fixChatHeight, 350);
}

function setupChatKeyboard() {
  const inp = document.getElementById('chatInput');
  if (!inp) return;
  inp.addEventListener('focus', () => {
    chatInputWasFocused = true;
    fixChatHeightDelayed();
    const c = document.getElementById('chatMessages');
    if (c) c.scrollTop = c.scrollHeight;
    setTimeout(() => { if (c) c.scrollTop = c.scrollHeight; }, 350);
  });
  inp.addEventListener('blur', () => {
    chatInputWasFocused = false;
  });
}

if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', fixChatHeightDelayed);
  window.visualViewport.addEventListener('scroll', fixChatHeight);
}
window.addEventListener('resize', fixChatHeightDelayed);

// ---- PULL TO REFRESH (still, kein Indikator) ----
(function(){
  const THRESHOLD = 70;
  let startY = 0, pulling = false;
  document.addEventListener('touchstart', e => {
    if (currentPage === 'chat') return;
    const pageEl = document.getElementById(currentPage + 'Page');
    const scrollTop = pageEl ? pageEl.scrollTop : window.scrollY;
    if (scrollTop <= 0) { startY = e.touches[0].clientY; pulling = true; }
  }, { passive: true });
  document.addEventListener('touchmove', e => {
    if (!pulling || currentPage === 'chat') return;
    if (e.touches[0].clientY - startY <= 0) pulling = false;
  }, { passive: true });
  document.addEventListener('touchend', () => {
    if (!pulling) return;
    pulling = false;
  });
  document.addEventListener('touchend', e => {
    if (currentPage === 'chat') return;
    const pageEl = document.getElementById(currentPage + 'Page');
    const scrollTop = pageEl ? pageEl.scrollTop : window.scrollY;
    if (scrollTop <= 0 && e.changedTouches[0].clientY - startY > THRESHOLD) {
      switchPage(currentPage);
    }
  });
})();

function navTap(page) {
  if (currentPage === page) {
    // Schon auf dieser Seite → zum Anfang scrollen
    const pageEl = document.getElementById(page + 'Page');
    if (pageEl) pageEl.scrollTop = 0;
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }
  switchPage(page);
}

function switchPage(page) {
  currentPage = page;
  const nav = document.getElementById('bottomNav');
  const mainHeader = document.getElementById('mainHeader');
  const chatPageEl = document.getElementById('chatPage');
  // Im Chat: Nav + Hauptheader ausblenden (chatPage überdeckt alles mit z-index:100)
  if (nav) nav.style.display = page === 'chat' ? 'none' : '';
  if (mainHeader) mainHeader.style.display = page === 'chat' ? 'none' : 'flex';
  if (page === 'chat') setTimeout(fixChatHeight, 0);
  document.querySelectorAll('.page, #chatPage').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const el = document.getElementById(page + 'Page');
  if(el) el.classList.add('active');
  document.querySelector(`[data-page="${page}"]`)?.classList.add('active');
  if(page === 'home') renderHome();
  else if(page === 'termine') renderTermine();
  else if(page === 'chat') {
    lastChatRead = Date.now();
    LSset('lastChatRead', String(lastChatRead));
    updateChatBadge();
    renderChat();
    setTimeout(() => {
      fixChatHeight();
      const c = document.getElementById('chatMessages');
      if(c) c.scrollTop = c.scrollHeight;
    }, 50);
  }
  else if(page === 'team') renderTeam();
  else if(page === 'galerie') renderGalerie();
  else if(page === 'trainer') renderTrainer();
}

    if(!dateStr) return 0;
    try {
      const t = timeStr || '00:00';
      return new Date(dateStr + 'T' + t).getTime();
    } catch(e) { return 0; }
  }

    ...STATE.trainings.map(t => ({...t, type:'training', sortDate: parseSortDate(t.date, t.time)})),
    ...STATE.games.map(g => ({...g, type:'game', sortDate: parseSortDate(g.date, g.time)}))

  // ── TRAINER QUICK STATS ──
  if(trainerLoggedIn) {

  // ── STATUS BANNER (sofort sichtbar ohne scrollen) ──
  const openRsvp     = pid ? upcomingTrainings.filter(t => { const s = t.attendances?.[pid]; return !s || s === 'open'; }).length : 0;

  if(openRsvp > 0 && newTrainings.length === 0) {

  if(newGames.length > 0) {
    banners.push({
      bg: 'linear-gradient(135deg,#B45309,#D97706)',
      icon: 'fas fa-futbol',
      msg: newGames.length === 1 ? `⚽ Neues Spiel eingetragen!` : `⚽ ${newGames.length} neue Spiele eingetragen!`,

  // Offene Spiel-Nominierungs-Rückmeldung
  const openGameRsvp = pid ? upcomingGames.filter(g => {

    if(!squadKeys.includes(pid)) return false; // nicht nominiert

  // ── Abstimmungs-Banner ──
  const today2 = new Date().toISOString().slice(0,10);

  const voteKey = pid ? btoa(pid).replace(/[^a-zA-Z0-9]/g,'').slice(0,16) : null;
  const unvotedPolls = openPolls.filter(p => voteKey && !((p.votes||{})[voteKey]));

    const barsHtml = (poll.options||[]).map((opt,i) => {

          ⚠️ Kind zuordnen → Profil bearbeiten
        </div>`;
      }

      html += `<div class="event-slide" style="">
        <div style="background:linear-gradient(135deg,#0A2540,#1e4d8c);padding:18px;border-radius:18px;overflow:hidden;box-sizing:border-box;width:100%">
          <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:12px">

              <div style="font-size:12px;color:rgba(255,255,255,.7);margin-top:4px">

                ${t.location ? ` · <i class="fas fa-location-dot" style="opacity:.7;margin-right:3px"></i>${escHtml(t.location)}` : ''}

    html += `</div>`;
    if(upcomingTrainings.length > 1) {
      html += `<div id="sliderDots-training" style="display:flex;justify-content:center;gap:6px;margin-top:8px">
        ${upcomingTrainings.map((_,i) => `<div style="width:${i===0?'18':'7'}px;height:7px;border-radius:4px;background:${i===0?'#4F46E5':'#D1D5DB'};transition:all .3s" data-idx="${i}"></div>`).join('')}
      </div>`;
    }
    html += `</div>`;
  }

  // ── GAME SLIDER ──
  if(upcomingGames.length > 0) {
    html += `<div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">

        <span style="font-size:13px;font-weight:800;color:#1F2937">Spiele &amp; Turniere</span>

      const extra        = squadKeys.length - squadPlayers.length;

      let childBadge = '';
      if(pid) {
        if(!squadSet) {
          childBadge = `<div style="background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.25);border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;color:#fff;margin-top:10px">📋 Kader noch offen</div>`;

            </div>`;
          } else if(conf === 'no') {
            childBadge = `<div style="margin-top:10px;display:flex;gap:8px;align-items:center">

              <button onclick="event.stopPropagation();setGameRsvp('${g.id}','${pid}','open')" style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:5px 10px;font-size:11px;color:#fff;cursor:pointer">Ändern</button>

            childBadge = `<div style="margin-top:10px">

                <button onclick="event.stopPropagation();setGameRsvp('${g.id}','${pid}','no')" style="flex:1;padding:8px;border-radius:8px;border:2px solid rgba(255,255,255,.4);background:rgba(239,68,68,.25);color:#fff;font-size:12px;font-weight:700;cursor:pointer">❌ Absagen</button>

      let squadRow = '';
      if(squadSet) {
        squadRow = `<div style="display:flex;gap:3px;margin-top:10px;flex-wrap:wrap">
          ${squadPlayers.map(p=>`<div style="position:relative">
            <div style="width:30px;height:30px;border-radius:50%;overflow:hidden;border:2px solid rgba(0,0,0,.25)">
              ${p.photo?`<img src="${p.photo}" style="width:100%;height:100%;object-fit:cover">`:`<div style="width:100%;height:100%;background:#0A2540;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700">${(p.name||'?')[0].toUpperCase()}</div>`}
            </div>
            <div style="position:absolute;bottom:-1px;right:-2px;background:#0A2540;color:#fff;font-size:7px;font-weight:800;padding:1px 3px;border-radius:4px">${p.number||'?'}</div>
          </div>`).join('')}
          ${extra>0?`<div style="width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff">+${extra}</div>`:''}
        </div>`;
      }

      html += `<div class="event-slide" style="">
        <div style="background:linear-gradient(135deg,#B45309,#F59E0B);padding:18px;border-radius:18px;overflow:hidden;box-sizing:border-box;width:100%">
          <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:12px">
            ${dateBox(g.date, true)}
            <div style="flex:1;min-width:0">
              <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">⚽ Spiel${isNew(g.createdAt)?' <span style="background:#EF4444;color:#fff;font-size:9px;padding:2px 6px;border-radius:4px;margin-left:4px">NEU</span>':''}</div>
              <div style="font-size:15px;font-weight:800;color:#fff;line-height:1.2">${escHtml(g.opponent||'?')}</div>
              <div style="font-size:12px;color:#fff;margin-top:4px;font-weight:700">
                <i class="fas fa-clock" style="opacity:.8;margin-right:3px"></i>Treffpunkt: ${g.time||'?'}
                ${g.location ? ` · <i class="fas fa-location-dot" style="opacity:.8;margin-right:3px"></i>${escHtml(g.location)}` : ''}
                ${g.notes ? `<div style="margin-top:4px;font-size:12px;font-weight:400;opacity:.9"><i class="fas fa-circle-info" style="margin-right:3px"></i>${escHtml(g.notes)}</div>` : ''}
              </div>
            </div>
            <button onclick="event.stopPropagation();calBtn(this)" data-title="FC Niksar -${(g.opponent||'').replace(/"/g,'')}" data-date="${g.date||''}" data-time="${g.time||''}" data-loc="${(g.location||'').replace(/"/g,'')}" data-dur="120" style="background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);border-radius:8px;padding:6px 8px;font-size:11px;color:#fff;cursor:pointer;white-space:nowrap;flex-shrink:0">
              <i class="fas fa-calendar-plus"></i>
            </button>
          </div>
          ${g.result ? `<div style="background:rgba(0,0,0,.2);display:inline-block;padding:3px 12px;border-radius:6px;font-size:18px;font-weight:900;color:#fff;margin-bottom:4px">${escHtml(g.result)}</div>` : ''}
          ${childBadge}
          ${squadRow}
        </div>
      </div>`;
    });

    html += `</div>`;
    if(upcomingGames.length > 1) {
      html += `<div id="sliderDots-games" style="display:flex;justify-content:center;gap:6px;margin-top:8px">
        ${upcomingGames.map((_,i) => `<div style="width:${i===0?'18':'7'}px;height:7px;border-radius:4px;background:${i===0?'#D97706':'#D1D5DB'};transition:all .3s" data-idx="${i}"></div>`).join('')}
      </div>`;
    }
    html += `</div>`;
  }


  html += `</div></div>`;
  page.innerHTML = html;

  // ── SLIDER: immer auf erstes Element zurücksetzen ──
  requestAnimationFrame(() => {
    ['sliderTraining', 'sliderGames'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.scrollLeft = 0;
    });
  });

  // ── SLIDER DOT LISTENERS ──
  ['Training', 'Games'].forEach(suffix => {
    const slider = document.getElementById('slider' + suffix);
    const dotsEl = document.getElementById('sliderDots-' + suffix.toLowerCase());
    if(!slider || !dotsEl) return;
    const dots = dotsEl.querySelectorAll('div[data-idx]');
    const slideEls = slider.querySelectorAll('.event-slide');
    const activeColor = suffix === 'Training' ? '#4F46E5' : '#D97706';
    slider.addEventListener('scroll', () => {
      if(!slideEls.length) return;
      const idx = Math.round(slider.scrollLeft / (slideEls[0].offsetWidth + 12));
      dots.forEach((d, i) => {
        d.style.width = i === idx ? '18px' : '7px';
        d.style.background = i === idx ? activeColor : '#D1D5DB';
      });
    }, {passive: true});
  });
}

// ---- TERMINE / CALENDAR ----
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
let activeTermineTab = 'kalender';
let selectedDay = null;

function renderTermine() {
  const page = document.getElementById('terminePage');
  if(!page) return;

  const todayDate = new Date();
  const firstDay = new Date(calYear, calMonth, 1);
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  let startDow = firstDay.getDay();
  startDow = startDow === 0 ? 6 : startDow - 1;

  const monthName = firstDay.toLocaleDateString('de-DE', {month:'long', year:'numeric'});

  const eventMap = {};

  STATE.trainings.forEach(t => {
    if(!t.date) return;
    if(!eventMap[t.date]) eventMap[t.date] = [];
    eventMap[t.date].push({...t, _type:'training'});
  });
  STATE.games.forEach(g => {
    if(!g.date) return;
    if(!eventMap[g.date]) eventMap[g.date] = [];
    eventMap[g.date].push({...g, _type:'game'});
  });

  let dayCells = '';
  const totalCells = startDow + daysInMonth;
  const rows = Math.ceil(totalCells / 7);

  for(let i = 0; i < rows * 7; i++) {
    const dayNum = i - startDow + 1;
    if(dayNum < 1 || dayNum > daysInMonth) {
      dayCells += `<div></div>`;
      continue;
    }
    const mm = String(calMonth + 1).padStart(2,'0');
    const dd = String(dayNum).padStart(2,'0');
    const dateStr = `${calYear}-${mm}-${dd}`;
    const events = eventMap[dateStr] || [];
    const hasTraining = events.some(e => e._type === 'training');
    const hasGame     = events.some(e => e._type === 'game');
    const isToday     = dayNum === todayDate.getDate() && calMonth === todayDate.getMonth() && calYear === todayDate.getFullYear();
    const isSelected  = dateStr === selectedDay;
    const isPast      = new Date(dateStr + 'T23:59:59') < todayDate;

    let bg = 'transparent', textCol = isPast ? '#C4C4C4' : '#1F2937', border = 'none';
    if(isToday)    { bg = '#0A2540'; textCol = '#fff'; }
    if(isSelected && !isToday) { bg = '#EEF2FF'; border = '2px solid #0A2540'; textCol = '#0A2540'; }

    // Farbige Hintergrundtönung für Tage mit Events (gut sichtbar)
    let cellBg = bg;
    if(cellBg === 'transparent') {
      if(hasTraining && hasGame) cellBg = 'linear-gradient(135deg,#DBEAFE,#FEF3C7)';
      else if(hasTraining) cellBg = '#DBEAFE';
      else if(hasGame)     cellBg = '#FEF3C7';
    }

    const dots = `<div style="display:flex;justify-content:center;gap:3px;margin-top:3px">
      ${hasTraining ? `<div style="width:8px;height:8px;border-radius:50%;background:#2563EB;flex-shrink:0;box-shadow:0 1px 2px rgba(37,99,235,.4)"></div>` : ''}
      ${hasGame     ? `<div style="width:8px;height:8px;border-radius:50%;background:#D97706;flex-shrink:0;box-shadow:0 1px 2px rgba(217,119,6,.4)"></div>` : ''}
    </div>`;

    dayCells += `<div onclick="selectDay('${dateStr}')" style="aspect-ratio:1;min-height:44px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:12px;cursor:${events.length?'pointer':'default'};background:${cellBg};border:${border};user-select:none;transition:opacity .15s" ${events.length?'onmousedown="this.style.opacity=\'.7\'" onmouseup="this.style.opacity=\'1\'"':''}>
      <div style="font-size:16px;font-weight:${isToday||isSelected?'800':'500'};color:${textCol};line-height:1">${dayNum}</div>
      ${dots}
    </div>`;
  }

  let detailHtml = '';
  if(selectedDay && eventMap[selectedDay]) {
    const pid = getProfile()?.playerId;
    detailHtml = eventMap[selectedDay].map(ev => {
      const isT = ev._type === 'training';
      const bg  = isT ? 'linear-gradient(135deg,#0A2540,#1e4d8c)' : 'linear-gradient(135deg,#B45309,#F59E0B)';
      let extra = '';
      if(!isT) {
        const squadKeys = Object.keys(ev.squad||{}).filter(k=>ev.squad[k]);
        if(pid && squadKeys.length > 0) {
          const inSquad = squadKeys.includes(pid);
          if(inSquad) {
            const conf = ev.squadConfirm?.[pid];
            if(conf === 'yes') {
              extra = `<div style="margin-top:8px;display:flex;gap:8px;align-items:center">
                <div style="background:rgba(16,185,129,.3);border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;color:#fff">✅ Nominiert · Zugesagt</div>
                <button onclick="setGameRsvp('${ev.id}','${pid}','open')" style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:5px 10px;font-size:11px;color:#fff;cursor:pointer">Ändern</button>
              </div>`;
            } else if(conf === 'no') {
              extra = `<div style="margin-top:8px;display:flex;gap:8px;align-items:center">
                <div style="background:rgba(239,68,68,.25);border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;color:#fff">⚠️ Nominiert · Abgesagt</div>
                <button onclick="setGameRsvp('${ev.id}','${pid}','open')" style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:5px 10px;font-size:11px;color:#fff;cursor:pointer">Ändern</button>
              </div>`;
            } else {
              extra = `<div style="margin-top:8px">
                <div style="font-size:12px;font-weight:700;color:#fff;margin-bottom:6px">✅ Dein Kind spielt mit! Kannst du kommen?</div>
                <div style="display:flex;gap:8px">
                  <button onclick="setGameRsvp('${ev.id}','${pid}','yes')" style="flex:1;padding:8px;border-radius:8px;border:2px solid rgba(255,255,255,.4);background:rgba(16,185,129,.3);color:#fff;font-size:12px;font-weight:700;cursor:pointer">✅ Zusagen</button>
                  <button onclick="setGameRsvp('${ev.id}','${pid}','no')" style="flex:1;padding:8px;border-radius:8px;border:2px solid rgba(255,255,255,.4);background:rgba(239,68,68,.25);color:#fff;font-size:12px;font-weight:700;cursor:pointer">❌ Absagen</button>
                </div>
              </div>`;
            }
          } else {
            extra = `<div style="margin-top:8px;background:rgba(239,68,68,.25);border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;color:#fff">❌ Diesmal nicht nominiert</div>`;
          }
        }
      } else if(pid) {
        const s = (window._localAtt?.[ev.id+'_'+pid]) ?? ev.attendances?.[pid];
        if(s === 'yes') {
          extra = `<div style="margin-top:8px;display:flex;gap:8px;align-items:center">
            <div style="background:#10B981;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;color:#fff">✅ Zugesagt</div>
            <button onclick="setRsvp('${ev.id}','${pid}','open')" style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:8px 12px;font-size:12px;color:#fff;cursor:pointer">Ändern</button>
          </div>`;
        } else if(s === 'no') {
          extra = `<div style="margin-top:8px;display:flex;gap:8px;align-items:center">
            <div style="background:#EF4444;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;color:#fff">❌ Abgesagt</div>
            <button onclick="setRsvp('${ev.id}','${pid}','open')" style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:8px 12px;font-size:12px;color:#fff;cursor:pointer">Ändern</button>
          </div>`;
        } else {
          extra = `<div style="margin-top:8px;display:flex;gap:6px">
            <button onclick="setRsvp('${ev.id}','${pid}','yes')" style="flex:1;padding:8px 4px;border-radius:8px;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-size:12px;font-weight:700;cursor:pointer">✅ Zusagen</button>
            <button onclick="setRsvp('${ev.id}','${pid}','no')" style="flex:1;padding:8px 4px;border-radius:8px;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-size:12px;font-weight:700;cursor:pointer">❌ Absagen</button>
          </div>`;
        }
      }
      return `<div style="background:${bg};border-radius:16px;padding:14px;color:#fff;margin-bottom:10px">
        <div style="font-size:11px;font-weight:700;opacity:.6;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">${isT?'🏃 Training':'⚽ Spiel'}</div>
        <div style="font-size:17px;font-weight:900;margin-bottom:6px">${isT ? fmtFull(ev.date) : escHtml(ev.opponent||'?')}</div>
        <div style="font-size:12px;opacity:.8;display:flex;flex-direction:column;gap:2px">
          <div><i class="fas fa-clock" style="width:14px"></i> ${ev.time||'?'} Uhr</div>
          <div><i class="fas fa-location-dot" style="width:14px"></i> ${escHtml(ev.location||'?')}</div>
        </div>
        ${ev.result?`<div style="margin-top:8px;font-size:18px;font-weight:900">Ergebnis: ${escHtml(ev.result)}</div>`:''}
        ${extra}
        <button onclick="calBtn(this)" data-title="${isT?'FC Niksar Training':'FC Niksar -'+(ev.opponent||'')}" data-date="${ev.date}" data-time="${ev.time||''}" data-loc="${(ev.location||'').replace(/"/g,'')}" data-dur="${isT?90:120}" style="margin-top:10px;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.2);border-radius:8px;padding:7px 12px;font-size:11px;font-weight:600;color:rgba(255,255,255,.85);cursor:pointer;display:inline-flex;align-items:center;gap:5px">
          <i class="fas fa-calendar-plus"></i> Zum Kalender
        </button>
      </div>`;
    }).join('');
  } else if(selectedDay) {
    detailHtml = `<div style="text-align:center;padding:20px;color:#9CA3AF;font-size:13px">Kein Termin an diesem Tag</div>`;
  }

  // ── Icon Tab Bar ──
  const tabs = [
    { id:'kalender',    icon:'fa-calendar-days',  label:'Kalender'     },
    { id:'abwesenheit', icon:'fa-calendar-xmark',  label:'Abwesenheit'  },
    { id:'abstimmung',  icon:'fa-square-poll-horizontal', label:'Abstimmung' },
  ];
  const tabBar = `<div style="display:flex;background:#fff;border-bottom:1px solid #F3F4F6;position:sticky;top:0;z-index:10;padding:0 8px">
    ${tabs.map(t => `
      <button onclick="switchTermineTab('${t.id}')" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 4px 10px;border:none;background:transparent;cursor:pointer;position:relative;border-bottom:3px solid ${activeTermineTab===t.id?'#0A2540':'transparent'};transition:border-color .2s">
        <i class="fas ${t.icon}" style="font-size:18px;color:${activeTermineTab===t.id?'#0A2540':'#9CA3AF'}"></i>
        <span style="font-size:10px;font-weight:700;color:${activeTermineTab===t.id?'#0A2540':'#9CA3AF'};letter-spacing:.02em">${t.label}</span>
      </button>`).join('')}
  </div>`;

  let tabContent = '';

  if(activeTermineTab === 'kalender') {
    tabContent = `
    <div style="max-width:600px;margin:0 auto;width:100%">
    <div style="padding:12px 12px 0">
      <div style="padding:8px 8px 0;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <button onclick="changeCalMonth(-1)" style="width:38px;height:38px;border-radius:50%;border:none;background:#F3F4F6;cursor:pointer;display:flex;align-items:center;justify-content:center"><i class="fas fa-chevron-left" style="color:#374151;font-size:13px"></i></button>
        <div style="font-size:17px;font-weight:800;color:#1F2937;text-transform:capitalize">${monthName}</div>
        <button onclick="changeCalMonth(1)" style="width:38px;height:38px;border-radius:50%;border:none;background:#F3F4F6;cursor:pointer;display:flex;align-items:center;justify-content:center"><i class="fas fa-chevron-right" style="color:#374151;font-size:13px"></i></button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px">
        ${['Mo','Di','Mi','Do','Fr','Sa','So'].map(d => `<div style="text-align:center;font-size:11px;font-weight:700;color:#9CA3AF;padding:4px 0">${d}</div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px">${dayCells}</div>
      <div style="display:flex;justify-content:center;gap:20px;margin-top:14px;padding:12px;background:#F9FAFB;border-radius:12px">
        <div style="display:flex;align-items:center;gap:6px"><div style="width:10px;height:10px;border-radius:50%;background:#3B82F6"></div><span style="font-size:12px;color:#6B7280;font-weight:600">Training</span></div>
        <div style="display:flex;align-items:center;gap:6px"><div style="width:10px;height:10px;border-radius:50%;background:#F59E0B"></div><span style="font-size:12px;color:#6B7280;font-weight:600">Spiel</span></div>
        <div style="display:flex;align-items:center;gap:6px"><div style="width:10px;height:10px;border-radius:50%;background:#0A2540"></div><span style="font-size:12px;color:#6B7280;font-weight:600">Heute</span></div>
      </div>
    </div>
    <div style="padding:0 12px 16px">
      ${selectedDay ? `<div style="margin-top:16px"><div style="font-size:12px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">${new Date(selectedDay+'T12:00:00').toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'})}</div>${detailHtml}</div>` :
      `<div style="text-align:center;padding:28px;color:#D1D5DB"><i class="fas fa-hand-pointer" style="font-size:28px;display:block;margin-bottom:10px"></i><span style="font-size:13px">Tag antippen für Details</span></div>`}
    </div>
    </div>`;
  } else if(activeTermineTab === 'abwesenheit') {
    tabContent = renderAbsenceTab();
  } else if(activeTermineTab === 'abstimmung') {
    tabContent = renderPollTab();
  }

  page.innerHTML = tabBar + tabContent;
}

function switchTermineTab(tab) {
  activeTermineTab = tab;
  renderTermine();
}

function selectDay(dateStr) {
  selectedDay = selectedDay === dateStr ? null : dateStr;
  renderTermine();
}

// ---- ABWESENHEIT TAB (modern) ----
function renderAbsenceTab() {
  const pid = getProfile()?.playerId;
  if(!pid) return `<div style="padding:40px 20px;text-align:center;color:#9CA3AF"><i class="fas fa-user-slash" style="font-size:36px;margin-bottom:12px;display:block"></i><div style="font-size:14px;font-weight:600">Kein Kind zugeordnet</div></div>`;
  const today = new Date().toISOString().slice(0,10);
  const myAbsences = STATE.absences.filter(a => a.playerId === pid).sort((a,b) => a.fromDate.localeCompare(b.fromDate));
  const upcoming = myAbsences.filter(a => (a.toDate||a.fromDate) >= today);
  const past = myAbsences.filter(a => (a.toDate||a.fromDate) < today);
  const fmtD = d => new Date(d+'T12:00:00').toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'});
  const iconMap = { krank:'🤒', urlaub:'🏖️', sonstige:'📋' };
  const colorMap = { krank:'#FEF2F2:#EF4444', urlaub:'#EFF6FF:#3B82F6', sonstige:'#F9FAFB:#6B7280' };

  const absCard = (a) => {
    const [bg, col] = (colorMap[a.reason]||'#F9FAFB:#6B7280').split(':');
    const sameDay = !a.toDate || a.fromDate === a.toDate;
    const dateLabel = sameDay ? fmtD(a.fromDate) : `${fmtD(a.fromDate)} – ${fmtD(a.toDate)}`;
    const affT = STATE.trainings.filter(t => t.date >= a.fromDate && t.date <= (a.toDate||a.fromDate)).length;
    const affG = STATE.games.filter(g => g.date >= a.fromDate && g.date <= (a.toDate||a.fromDate)).length;
    return `<div style="background:#fff;border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)">
      <div style="width:44px;height:44px;border-radius:12px;background:${bg};display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">${iconMap[a.reason]||'📋'}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:800;color:#1F2937">${dateLabel}</div>
        <div style="font-size:11px;color:#6B7280;margin-top:2px">${ABSENCE_LABELS[a.reason]||'Abwesend'}${affT||affG ? ` · <span style="color:#EF4444;font-weight:700">${[affT?affT+'× Training':'',affG?affG+'× Spiel':''].filter(Boolean).join(', ')}</span>` : ''}</div>
        ${a.note ? `<div style="font-size:11px;color:#9CA3AF;margin-top:2px">${escHtml(a.note)}</div>` : ''}
      </div>
      <button onclick="deleteAbsence('${a.id}')" style="width:32px;height:32px;border-radius:10px;border:none;background:#FEE2E2;color:#DC2626;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="fas fa-trash" style="font-size:12px"></i></button>
    </div>`;
  };

  return `<div style="padding:16px;display:flex;flex-direction:column;gap:12px">
    <button onclick="addAbsenceModal()" style="background:#0A2540;color:#fff;border:none;border-radius:14px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">
      <i class="fas fa-plus-circle"></i> Abwesenheit melden

const POLL_COLORS = ['#6366F1','#10B981','#F59E0B','#EF4444','#8B5CF6','#06B6D4'];

function renderPollTab() {
  const polls = STATE.polls || [];
  const today = new Date().toISOString().slice(0,10);
  const pid = getProfile()?.playerId || getProfile()?.name || null;

  const activePoll = polls.filter(p => !p.deadline || p.deadline >= today).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  const donePoll   = polls.filter(p => p.deadline && p.deadline < today).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));

  const renderPollCard = (poll, closed) => {
    const votes = poll.votes || {};
    const totalVotes = Object.keys(votes).length;
    const myVote = pid ? votes[btoa(pid).replace(/[^a-zA-Z0-9]/g,'').slice(0,16)] : null;
    const optionCounts = {};
    (poll.options||[]).forEach(o => { optionCounts[o] = 0; });
    Object.values(votes).forEach(v => { if(optionCounts[v] !== undefined) optionCounts[v]++; });

    const resultsHtml = (poll.options||[]).map((opt, i) => {
      const count = optionCounts[opt] || 0;
      const pct = totalVotes ? Math.round(count/totalVotes*100) : 0;
      const col = POLL_COLORS[i % POLL_COLORS.length];
      const isMyVote = myVote === opt;
      return `<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <span style="font-size:13px;font-weight:${isMyVote?'800':'600'};color:${isMyVote?col:'#374151'}">${isMyVote?'✓ ':''}${escHtml(opt)}</span>
          <span style="font-size:12px;font-weight:700;color:${col}">${pct}% <span style="color:#9CA3AF;font-weight:500">(${count})</span></span>
        </div>
        <div style="height:10px;background:#F3F4F6;border-radius:999px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:${col};border-radius:999px;transition:width .6s ease"></div>
        </div>
      </div>`;
    }).join('');

    const voteButtons = (!closed && pid) ? `<div style="margin-top:12px">
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        ${(poll.options||[]).map((opt,i) => {
          const isSelected = myVote === opt;
          return `<button onclick="castVote('${poll.id}','${escHtml(opt)}')" style="padding:8px 16px;border-radius:10px;border:2px solid ${POLL_COLORS[i%POLL_COLORS.length]};background:${isSelected ? POLL_COLORS[i%POLL_COLORS.length] : POLL_COLORS[i%POLL_COLORS.length]+'18'};color:${isSelected ? '#fff' : POLL_COLORS[i%POLL_COLORS.length]};font-size:13px;font-weight:700;cursor:pointer">${isSelected ? '✓ ' : ''}${escHtml(opt)}</button>`;
        }).join('')}
      </div>
      ${myVote ? `<div style="font-size:11px;color:#9CA3AF;margin-top:6px">Tippe eine andere Option um deine Stimme zu ändern</div>` : ''}
    </div>` : '';

    // Trainer: wer hat wie abgestimmt
    const voterList = trainerLoggedIn ? (() => {
      const votersByOption = {};
      (poll.options||[]).forEach(o => { votersByOption[o] = []; });
      Object.entries(poll.votes||{}).forEach(([vk, opt]) => {
        const player = STATE.players.find(p => btoa(p.id).replace(/[^a-zA-Z0-9]/g,'').slice(0,16) === vk);
        const name = player ? player.name : '?';
        if (votersByOption[opt] !== undefined) votersByOption[opt].push(name);
      });
      const rows = (poll.options||[]).map((opt,i) => {
        const names = votersByOption[opt] || [];
        if(!names.length) return '';
        return `<div style="margin-bottom:6px"><span style="font-size:11px;font-weight:700;color:${POLL_COLORS[i%POLL_COLORS.length]}">${escHtml(opt)}:</span> <span style="font-size:11px;color:#374151">${names.map(n=>escHtml(n)).join(', ')}</span></div>`;
      }).join('');
      return rows ? `<div style="background:#F9FAFB;border-radius:10px;padding:10px 12px;margin-top:8px">${rows}</div>` : '';
    })() : '';

    const alreadyVoted = '';

    return `<div style="background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,.07)">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px">
        <div style="flex:1;min-width:0">
          <div style="font-size:11px;font-weight:700;color:${closed?'#9CA3AF':'#6366F1'};text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">${closed?'✓ Abgeschlossen':'🗳️ Offen'}</div>
          <div style="font-size:15px;font-weight:800;color:#1F2937">${escHtml(poll.question)}</div>
          ${poll.deadline?`<div style="font-size:11px;color:#9CA3AF;margin-top:2px">bis ${new Date(poll.deadline+'T12:00:00').toLocaleDateString('de-DE',{day:'numeric',month:'short'})}</div>`:''}
        </div>
        ${trainerLoggedIn?`<button onclick="deletePoll('${poll.id}')" style="width:30px;height:30px;border-radius:8px;border:none;background:#FEE2E2;color:#DC2626;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center"><i class="fas fa-trash" style="font-size:11px"></i></button>`:''}
      </div>
      <div style="font-size:12px;color:#6B7280;margin-bottom:12px">${totalVotes} Stimme${totalVotes!==1?'n':''}</div>

  return `<div style="padding:16px;display:flex;flex-direction:column;gap:12px">

async function savePoll() {
  const question = document.getElementById('pollQuestion')?.value.trim();
  const optionsRaw = document.getElementById('pollOptions')?.value || '';
  const options = optionsRaw.split('\n').map(o=>o.trim()).filter(Boolean);
  const deadline = document.getElementById('pollDeadline')?.value || null;
  if(!question) { showToast('Bitte eine Frage eingeben'); return; }
  if(options.length < 2) { showToast('Mindestens 2 Optionen eingeben'); return; }
  await db.ref('/polls').push({ question, options, deadline, votes:{}, createdAt: Date.now() });
  notifyAll('🗳️ Neue Abstimmung!', question, false, 'termine');
  closeModal();
  activeTermineTab = 'abstimmung';
  renderTermine();

function setRsvpHome(tid, pid, status) {
  // Optimistic local update → UI reagiert sofort
  window._rsvpEdit = window._rsvpEdit || {};
  delete window._rsvpEdit[tid];
  window._localAtt = window._localAtt || {};
  window._localAtt[tid + '_' + pid] = status;
  const _t = STATE.trainings.find(x => x.id === tid);
  if (_t) { _t.attendances = _t.attendances || {}; _t.attendances[pid] = status; }
  renderHome(); // sofortiger Neuaufbau mit lokalem Wert
  renderTermine();
  // Firebase schreiben (im Hintergrund)
  db.ref('/trainings/' + tid + '/attendances/' + pid).set(status).then(() => {
    // Firebase bestätigt → STATE nochmal aktualisieren und neu rendern
    const t2 = STATE.trainings.find(x => x.id === tid);
    if (t2) { t2.attendances = t2.attendances || {}; t2.attendances[pid] = status; }
    renderHome();
    renderTermine();
    // Erst jetzt lokalen Override entfernen
    if (window._localAtt) delete window._localAtt[tid + '_' + pid];
  });
}

  const start = new Date(dateStr + 'T' + (timeStr||'10:00'));

  const fmtGoogle = d => d.toISOString().replace(/[-:]/g,'').replace('.000','');
  const googleUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${fmtGoogle(start)}/${fmtGoogle(end)}&details=${encodeURIComponent('FC Niksar F1/U9 – Saison 26/27')}&location=${encodeURIComponent(location||'')}`;
  const startIso = start.toISOString().slice(0,19);
  const endIso   = end.toISOString().slice(0,19);
  const outlookUrl = `https://outlook.live.com/calendar/0/action/compose?rru=addevent&subject=${encodeURIComponent(title)}&startdt=${startIso}&enddt=${endIso}&body=${encodeURIComponent('FC Niksar F1/U9 – Saison 26/27')}&location=${encodeURIComponent(location||'')}`;
  showModal(`<div class="modal-handle"></div>

        <span style="font-size:26px">📧</span>

      </a>
      <a href="${googleUrl}" target="_blank" onclick="closeModal()" style="display:flex;align-items:center;gap:14px;background:#F0FDF4;border:1.5px solid #BBF7D0;border-radius:14px;padding:14px 16px;text-decoration:none">

      <button onclick="addToCalendarICS('${encodeURIComponent(title)}','${dateStr}','${timeStr||''}','${encodeURIComponent(location||'')}',${durationMin||90});closeModal();" style="display:flex;align-items:center;gap:14px;background:#F5F3FF;border:1.5px solid #C4B5FD;border-radius:14px;padding:14px 16px;cursor:pointer;width:100%;text-align:left">

        <div><div style="font-size:14px;font-weight:700;color:#5B21B6">Apple Kalender</div><div style="font-size:12px;color:#6B7280">Für iPhone / iPad</div></div>
      </button>
    </div>`);
}

function addToCalendarICS(titleEnc, dateStr, timeStr, locationEnc, durationMin) {
  const title = decodeURIComponent(titleEnc);
  const location = decodeURIComponent(locationEnc);
  const pad = n => String(n).padStart(2,'0');
  const fmtIcs = d => `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}T${pad(d.getHours())}${pad(d.getMinutes())}00`;
  const start = new Date(dateStr + 'T' + (timeStr||'10:00'));
  const end   = new Date(start.getTime() + (durationMin||90) * 60000);
  const ics = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//FC Niksar//App//DE',
    'METHOD:PUBLISH',
    'X-WR-CALNAME:FC Niksar',
    'X-WR-TIMEZONE:Europe/Berlin',
    'BEGIN:VEVENT',
    'UID:' + Date.now() + '@fcniksar',
    'DTSTART;TZID=Europe/Berlin:' + fmtIcs(start),
    'DTEND;TZID=Europe/Berlin:'   + fmtIcs(end),
    'SUMMARY:' + title.replace(/[,;\\]/g,'\\$&'),
    'LOCATION:' + (location||'').replace(/[,;\\]/g,'\\$&'),
    'DESCRIPTION:FC Niksar F1/U9 – Saison 26/27',
    'STATUS:CONFIRMED',
    'TRANSP:OPAQUE',
    'END:VEVENT',
    'END:VCALENDAR'
  ].join('\r\n');
  const blob = new Blob([ics], {type:'text/calendar;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  // Kein download-Attribut auf iOS → iOS öffnet direkt mit Kalender-App
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  if (!isIOS) a.download = title.replace(/\s+/g,'-') + '.ics';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 2000);
}

function formatFileSize(bytes) {
  if(!bytes) return '';
  if(bytes < 1024) return bytes + ' B';
  if(bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1048576).toFixed(1) + ' MB';
}

function getFileIcon(name) {
  const ext = (name||'').split('.').pop().toLowerCase();
  if(['jpg','jpeg','png','gif','webp'].includes(ext)) return 'fas fa-image';
  if(['pdf'].includes(ext)) return 'fas fa-file-pdf';
  if(['doc','docx'].includes(ext)) return 'fas fa-file-word';
  if(['xls','xlsx','csv'].includes(ext)) return 'fas fa-file-excel';
  if(['mp4','mov','avi'].includes(ext)) return 'fas fa-file-video';
  if(['mp3','wav','m4a'].includes(ext)) return 'fas fa-file-audio';
  if(['zip','rar','7z'].includes(ext)) return 'fas fa-file-zipper';
  return 'fas fa-file';
}

        <div style="font-weight:700;color:#374151;font-size:14px">Hallo! Schreib die erste Nachricht.</div>
      </div>
    </div>`;
  } else {
    let lastDate = '';
    msgs.forEach(m => {
      const msgDate = new Date(m.ts||0);
      const dateKey = msgDate.toDateString();
      const today = new Date().toDateString();
      const yesterday = new Date(Date.now()-86400000).toDateString();
      const dateLabel = dateKey===today?'Heute':dateKey===yesterday?'Gestern':msgDate.toLocaleDateString('de-DE',{day:'2-digit',month:'long'});

      if(dateKey !== lastDate) {
        msgsHtml += `<div class="wa-date-sep"><span>${dateLabel}</span></div>`;
        lastDate = dateKey;
      }

      const mine = myName && m.author === myName;
      const reactions = m.reactions || {};
      const hasReactions = Object.keys(reactions).some(e=>reactions[e]>0);
      const timeStr = msgDate.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});

      // Bubble content
      let content = '';
      if(m.image) {
        content = `<img src="${m.image}" onclick="viewChatImage('${m.id}')" style="max-width:220px;max-height:200px;border-radius:8px;display:block;cursor:pointer;object-fit:cover">`;
      } else if(m.file) {
        const icon = getFileIcon(m.fileName||'');
        const iconColor = icon.includes('pdf')?'#EF4444':icon.includes('word')?'#3B82F6':icon.includes('excel')?'#10B981':icon.includes('video')?'#8B5CF6':'#6B7280';
        content = `<div class="wa-file" onclick="downloadFile('${m.id}')">
          <div style="width:40px;height:40px;border-radius:10px;background:${iconColor}20;display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <i class="${icon}" style="color:${iconColor};font-size:18px"></i>
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:700;color:#1f2937;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(m.fileName||'Datei')}</div>
            <div style="font-size:11px;color:#6B7280;margin-top:1px">${formatFileSize(m.fileSize)} · Tippen zum Öffnen</div>
          </div>
        </div>`;
      } else {
        content = `<span style="font-size:14px;line-height:1.45;word-break:break-word">${escHtml(m.text||'')}</span>`;
      }

      // Reactions row
      const reactionRow = hasReactions ? `<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;${mine?'justify-content:flex-end':''}">
        ${Object.entries(reactions).filter(([,c])=>c>0).map(([e,c])=>{
          const isMine = myReactions[m.id+'_'+e];
          return `<button onclick="toggleReaction('${m.id}','${e}')" style="background:${isMine?'#DCF8C6':'#fff'};border:1.5px solid ${isMine?'#25D366':'#e5e7eb'};border-radius:20px;padding:2px 8px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:3px;box-shadow:0 1px 2px rgba(0,0,0,.08)">${e}<span style="font-size:11px;font-weight:700;color:#374151">${c}</span></button>`;
        }).join('')}
      </div>` : '';

      msgsHtml += `<div style="display:flex;flex-direction:column;align-items:${mine?'flex-end':'flex-start'};max-width:85%;${mine?'align-self:flex-end':'align-self:flex-start'}">
        ${!mine?`<div style="font-size:12px;font-weight:700;color:#075E54;margin-bottom:3px;padding:0 4px">${escHtml(m.author||'?')}</div>`:''}
        <div style="display:flex;align-items:flex-end;gap:5px;${mine?'flex-direction:row-reverse':''}">
          <div class="${mine?'wa-mine':'wa-other'}" style="padding:8px 10px;position:relative;max-width:280px">
            ${content}
            <div style="display:flex;align-items:center;gap:4px;justify-content:flex-end;margin-top:4px">
              <span style="font-size:10px;color:${mine?'#667781':'#9CA3AF'}">${timeStr}</span>
              ${mine?'<i class="fas fa-check-double" style="font-size:10px;color:#53bdeb"></i>':''}
            </div>
          </div>
          <button onclick="openReactionPicker('${m.id}')" style="background:none;border:none;width:20px;height:20px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:.35;color:#666">😊</button>
        </div>
        ${reactionRow}
      </div>`;
    });
  }

  page.innerHTML = `
    <div id="chatPageHeader">
      <button onclick="switchPage('home')" style="background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px 10px 4px 0;line-height:1;display:flex;align-items:center;-webkit-tap-highlight-color:transparent"><i class="fas fa-arrow-left"></i></button>
      <div style="width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">⚽</div>
      <div style="flex:1">
        <div style="font-size:15px;font-weight:700;color:#fff;line-height:1.2">FC Niksar Chat</div>
        <div style="font-size:11px;color:rgba(255,255,255,.6)">Mannschafts-Chat</div>
      </div>
    </div>
    <div id="chatMessages">
      ${msgsHtml}
    </div>
    <div class="wa-emoji-grid ${emojiOpen?'open':''}" id="emojiPicker">
      <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:2px">

      </div>
    </div>
    <div id="reactionPicker" style="display:none;justify-content:center;gap:6px;padding:8px 12px;background:#fff;border-top:1px solid #e5e7eb;flex-shrink:0">
      ${QUICK_REACTIONS.map(e=>`<button onclick="pickReaction('${e}')" style="background:#F3F4F6;border:none;width:44px;height:44px;border-radius:50%;font-size:24px;cursor:pointer">${e}</button>`).join('')}
      <button onclick="closeReactionPicker()" style="background:#F3F4F6;border:none;width:44px;height:44px;border-radius:50%;font-size:16px;cursor:pointer;color:#6B7280">✕</button>
    </div>
    <div class="wa-input-bar">
      ${!myName ? `
        <div style="width:100%;background:#FEF3C7;border-radius:10px;padding:8px 12px;font-size:12px;color:#92400E;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <i class="fas fa-user"></i>
          <input id="chatNameIn" placeholder="Dein Name eingeben..." style="border:none;background:none;flex:1;font-size:13px;font-weight:600;color:#92400E;outline:none" onkeydown="if(event.key==='Enter')setChatName()">
          <button onclick="setChatName()" style="background:#0A2540;color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer">OK</button>

      <button onclick="toggleEmojiPicker()" style="width:40px;height:40px;border-radius:50%;border:none;background:none;font-size:24px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#6B7280">😊</button>
      <label style="width:40px;height:40px;border-radius:50%;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#6B7280">
        <i class="fas fa-paperclip" style="font-size:20px"></i>
        <input type="file" style="display:none" onchange="sendChatFile(this)">
      </label>
      <input id="chatInput" placeholder="Nachricht…" style="flex:1;border:none;border-radius:20px;background:#fff;padding:10px 16px;font-size:16px;outline:none;box-shadow:0 1px 3px rgba(0,0,0,.12)" onkeydown="if(event.key==='Enter')sendChat()">
      <button onclick="sendChat()" style="width:44px;height:44px;border-radius:50%;border:none;background:#075E54;color:#fff;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px"><i class="fas fa-paper-plane"></i></button>
    </div>`;

  _lastRenderedChatCount = STATE.chat.length;
  setTimeout(() => { const c = document.getElementById('chatMessages'); if(c) c.scrollTop = c.scrollHeight; }, 80);
  setTimeout(setupChatKeyboard, 100);
}

function toggleEmojiPicker() {
  emojiOpen = !emojiOpen;
  const ep = document.getElementById('emojiPicker');
  const rp = document.getElementById('reactionPicker');
  if(ep) ep.classList.toggle('open', emojiOpen);
  if(rp) rp.style.display = 'none';
  currentReactionMsgId = null;
}

function closeReactionPicker() {
  const rp = document.getElementById('reactionPicker');
  if(rp) rp.style.display = 'none';
  currentReactionMsgId = null;
}

function insertEmoji(e) {
  const inp = document.getElementById('chatInput');
  if(inp){ inp.value += e; inp.focus(); }
}

function openReactionPicker(msgId) {
  currentReactionMsgId = msgId;
  const rp = document.getElementById('reactionPicker');
  const ep = document.getElementById('emojiPicker');
  if(ep) ep.style.display = 'none';
  emojiOpen = false;
  if(rp) { rp.style.display = 'flex'; }
}

function pickReaction(emoji) {
  if(currentReactionMsgId) toggleReaction(currentReactionMsgId, emoji);
  const rp = document.getElementById('reactionPicker');
  if(rp) rp.style.display = 'none';
  currentReactionMsgId = null;
}

function toggleReaction(msgId, emoji) {
  const myReactions = JSON.parse(LS('myReactions') || '{}');
  const key = msgId + '_' + emoji;
  const msg = STATE.chat.find(m => m.id === msgId);
  if(!msg) return;
  const current = (msg.reactions || {})[emoji] || 0;
  if(myReactions[key]) {
    // Entfernen
    delete myReactions[key];
    db.ref('/chat/' + msgId + '/reactions/' + emoji).set(Math.max(0, current - 1));
  } else {
    // Hinzufügen
    myReactions[key] = true;
    db.ref('/chat/' + msgId + '/reactions/' + emoji).set(current + 1);
  }
  LSset('myReactions', JSON.stringify(myReactions));
}

function sendChatFile(input) {
  const file = input.files[0]; if(!file) return;
  const author = getChatName();
  if(!author){ alert('Bitte zuerst Namen eingeben'); return; }
  if(file.size > 5 * 1024 * 1024) { alert('Datei zu groß (max. 5 MB)'); input.value=''; return; }
  const isImage = file.type.startsWith('image/');
  const reader = new FileReader();
  reader.onload = e => {
    if(isImage) {
      compressImage(e.target.result, 800, 0.8, data => {
        db.ref('/chat').push({ author, image: data, text: '', ts: Date.now() });
      });
    } else {
      db.ref('/chat').push({
        author, text: '', ts: Date.now(),
        file: e.target.result,
        fileName: file.name,
        fileSize: file.size,
        fileType: file.type
      });
    }
  };
  reader.readAsDataURL(file);
  input.value = '';
}

function downloadFile(id) {
  const m = STATE.chat.find(x => x.id === id);
  if(!m?.file) return;
  const a = document.createElement('a');
  a.href = m.file;
  a.download = m.fileName || 'datei';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function viewChatImage(id) {
  const m = STATE.chat.find(x => x.id === id);
  if(!m?.image) return;
  showModal(`<div style="text-align:center"><img src="${m.image}" style="max-width:100%;max-height:70vh;border-radius:12px"></div>`);
}

function setChatName() {
  const v = document.getElementById('chatNameIn')?.value.trim();
  if(v){ chatName = v; LSset('chatName', v); renderChat(); }
}

function sendChat() {
  const inp = document.getElementById('chatInput');
  if(!inp) return;
  const text = inp.value.trim();
  if(!text) return;
  const author = getChatName();
  if(!author){ alert('Bitte zuerst deinen Namen eingeben'); return; }
  inp.value = '';
  // Emoji picker schließen
  const ep = document.getElementById('emojiPicker');
  if(ep) ep.style.display = 'none';
  emojiOpen = false;
  db.ref('/chat').push({ author, text, ts: Date.now() });
  notifyAll('💬 Neue Nachricht', author + ': ' + text, true, 'chat');
  // Sofort nach unten scrollen
  setTimeout(() => {
    const c = document.getElementById('chatMessages');
    if (c) c.scrollTop = c.scrollHeight;
  }, 80);
}

// ---- TEAM ----
function renderTeam() {
  const page = document.getElementById('teamPage');
  if(!page) return;

  if(!STATE.players.length) {
    page.innerHTML = `<div style="text-align:center;padding:60px 20px;color:#9CA3AF"><div style="font-size:48px">👕</div><div style="font-weight:700;margin-top:12px">Noch keine Spieler</div></div>`;
    return;
  }

  const sorted = [...STATE.players].sort((a,b) => (parseInt(a.number,10)||999)-(parseInt(b.number,10)||999));

  const today = new Date();
  const todayMMDD = String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');

  function fmtBirthday(bd) {
    if(!bd) return null;
    const d = new Date(bd + 'T12:00:00');
    return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});
  }

  function isToday(bd) {
    if(!bd) return false;
    return bd.slice(5) === todayMMDD;
  }

  function daysUntilBirthday(bd) {
    if(!bd) return null;
    const now = new Date(); now.setHours(0,0,0,0);
    const mm = parseInt(bd.slice(5,7),10)-1;
    const dd = parseInt(bd.slice(8,10),10);
    let next = new Date(now.getFullYear(), mm, dd);
    if(next < now) next = new Date(now.getFullYear()+1, mm, dd);
    return Math.round((next - now) / 86400000);
  }

  page.innerHTML = `
    <div style="padding:4px 0 8px">
      <div class="section-title">Mannschaft (${sorted.length} Spieler)</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">
      ${sorted.map(p => {
        const bd = fmtBirthday(p.birthday);
        const today_bd = isToday(p.birthday);
        const daysLeft = daysUntilBirthday(p.birthday);
        const soonBirthday = daysLeft !== null && daysLeft <= 7 && daysLeft > 0;
        return `<div style="background:#fff;border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:14px;box-shadow:0 1px 6px rgba(0,0,0,.07);${today_bd ? 'border:2px solid #F59E0B;' : ''}">
          <div style="position:relative;flex-shrink:0">
            <div style="width:58px;height:58px;border-radius:50%;overflow:hidden;border:2.5px solid ${today_bd ? '#F59E0B' : '#E5E7EB'}">
              ${p.photo
                ? `<img src="${p.photo}" style="width:100%;height:100%;object-fit:cover">`
                : `<div style="width:100%;height:100%;background:linear-gradient(135deg,#0A2540,#1e4d8c);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff">${(p.name||'?')[0].toUpperCase()}</div>`}
            </div>
            <div style="position:absolute;bottom:-3px;right:-3px;background:#0A2540;color:#fff;font-size:10px;font-weight:800;padding:2px 5px;border-radius:6px;line-height:1.2">${p.number||'?'}</div>
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-size:15px;font-weight:800;color:#1F2937;display:flex;align-items:center;gap:6px">
              ${escHtml(p.name||'')}
              ${today_bd ? '<span style="font-size:16px">🎉</span>' : ''}
              ${soonBirthday ? `<span style="font-size:11px;background:#FEF3C7;color:#92400E;padding:2px 7px;border-radius:10px;font-weight:700">in ${daysLeft} Tag${daysLeft===1?'':'en'}</span>` : ''}
            </div>
            ${bd
              ? `<div style="font-size:13px;color:#6B7280;margin-top:3px;display:flex;align-items:center;gap:4px"><i class="fas fa-cake-candles" style="font-size:12px;color:#F59E0B"></i>${bd}</div>`
              : `<div style="font-size:12px;color:#D1D5DB;margin-top:3px;font-style:italic">Kein Geburtstag hinterlegt</div>`}
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

function renderPinScreen(page) {
  let pinVal = '';
  page.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;padding:40px 20px;gap:16px">
      <div style="font-size:40px">🔐</div>
      <div style="font-size:22px;font-weight:800;color:#0A2540">Trainer PIN</div>
      <div id="pinDisplay" style="font-size:32px;letter-spacing:14px;color:#0A2540;margin:8px 0">○○○○</div>
      <div id="pinError" style="color:#EF4444;font-size:14px;min-height:20px"></div>
      <div class="pin-grid" id="pinGrid"></div>
    </div>`;
  const update = () => {
    const d = document.getElementById('pinDisplay');
    if(d) d.innerHTML = '●'.repeat(pinVal.length) + '○'.repeat(Math.max(0,4-pinVal.length));
  };
  const grid = document.getElementById('pinGrid');
  if(!grid) return;
  ['1','2','3','4','5','6','7','8','9','⌫','0','✓'].forEach(k => {
    const btn = document.createElement('button');
    btn.className = 'pin-btn'; btn.textContent = k;
    btn.onclick = () => {
      if(k==='⌫'){ pinVal = pinVal.slice(0,-1); update(); return; }
      if(k==='✓' || pinVal.length >= 3 && k !== '⌫') {
        if(k !== '✓') pinVal += k;
        update();
        if(pinVal.length >= 4 || k==='✓') {
          const pin = STATE.config.trainerPin || '1920';
          if(pinVal === pin){ trainerLoggedIn=true; LSset('trainerLoggedIn','true'); updateHeader(); renderTrainer(); }
          else { document.getElementById('pinError').textContent='Falscher PIN'; pinVal=''; update(); }
        }
        return;
      }
      pinVal += k; update();
    };
    grid.appendChild(btn);
  });
}

function trainerLogout(){ trainerLoggedIn=false; LSset('trainerLoggedIn','false'); updateHeader(); renderTrainer(); }

function renderTrainerTab() {
  const c = document.getElementById('trainerContent');
  if(!c) return;
  const tab = trainerTab;
  if(tab==='spieler') renderSpielerTab(c);
  else if(tab==='training') renderTrainingTab(c);
  else if(tab==='spiele') renderSpieleTab(c);
  else if(tab==='statistiken') renderStatistikTab(c);
  else if(tab==='einstellungen') renderEinstellungenTab(c);
}

// ---- ABWESENHEITEN TOGGLE ----
if (window._absOverviewOpen === undefined) window._absOverviewOpen = true;
function toggleAbsOverview() {
  window._absOverviewOpen = !window._absOverviewOpen;
  const body = document.getElementById('absOverviewBody');
  const chevron = document.getElementById('absOverviewChevron');
  if (body) {
    body.style.maxHeight = window._absOverviewOpen ? '2000px' : '0';
    body.style.marginTop = window._absOverviewOpen ? '10px' : '0';
  }
  if (chevron) {
