// ---- SPIELER TAB ----
function renderSpielerTab(c) {
  const sorted = [...STATE.players].sort((a,b) => (parseInt(a.number)||999) - (parseInt(b.number)||999));
  const today = new Date().toISOString().slice(0,10);

  // Kommende Abwesenheiten (ab heute), nach Startdatum sortiert
  const upcomingAbs = STATE.absences
    .filter(a => (a.toDate || a.fromDate) >= today)
    .sort((a,b) => a.fromDate.localeCompare(b.fromDate));

  const fmtD = d => new Date(d+'T12:00:00').toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'});
  const fmtDY = d => new Date(d+'T12:00:00').toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});

  const absSection = upcomingAbs.length === 0
    ? `<div style="text-align:center;padding:14px;color:#9CA3AF;font-size:13px;background:#F9FAFB;border-radius:10px">Keine bevorstehenden Abwesenheiten 👍</div>`
    : upcomingAbs.map(a => {
        const player = STATE.players.find(p => p.id === a.playerId);
        if(!player) return '';
        const sameDay = !a.toDate || a.fromDate === a.toDate;
        const dateLabel = sameDay ? fmtDY(a.fromDate) : `${fmtD(a.fromDate)} – ${fmtDY(a.toDate)}`;
        const label = ABSENCE_LABELS[a.reason] || '📋 Abwesend';
        const affTrainings = STATE.trainings.filter(t => t.date >= a.fromDate && t.date <= (a.toDate||a.fromDate));
        const affGames = STATE.games.filter(g => g.date >= a.fromDate && g.date <= (a.toDate||a.fromDate));
        const chips = [
          ...affTrainings.map(t => `<span style="background:#DBEAFE;color:#1D4ED8;font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px">🏃 ${fmtD(t.date)}</span>`),
          ...affGames.map(g => `<span style="background:#FEF3C7;color:#B45309;font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px">⚽ ${escHtml(g.opponent||fmtD(g.date))}</span>`)
        ].join('');
        return `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border-radius:12px;border:1px solid #F3F4F6;margin-bottom:8px">
          ${player.photo
            ? `<img src="${player.photo}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0">`
            : `<div style="width:40px;height:40px;border-radius:50%;background:#0A2540;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:700;flex-shrink:0">${(player.name||'?')[0].toUpperCase()}</div>`}
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
              <span style="font-size:13px;font-weight:700;color:#1F2937">${escHtml(player.name||'?')}</span>
              <span style="font-size:11px;font-weight:700;color:#F59E0B">${label}</span>
            </div>
            <div style="font-size:12px;color:#6B7280;margin-top:1px">${dateLabel}</div>
            ${a.note ? `<div style="font-size:11px;color:#9CA3AF;margin-top:1px">${escHtml(a.note)}</div>` : ''}
            ${chips ? `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:5px">${chips}</div>` : '<div style="font-size:11px;color:#9CA3AF;margin-top:3px">Keine Trainings/Spiele betroffen</div>'}
          </div>
          <button onclick="db.ref('/absences/${a.id}').remove()" style="width:30px;height:30px;border-radius:8px;border:none;background:#FEE2E2;color:#991B1B;cursor:pointer;font-size:13px;flex-shrink:0">🗑</button>
        </div>`;
      }).join('');

  c.innerHTML = `
    <button class="btn-primary" onclick="addPlayerModal()"><i class="fa fa-plus"></i> Spieler hinzufügen</button>

    <div style="background:#FFF8F0;border:1.5px solid #FED7AA;border-radius:14px;padding:14px;margin-bottom:4px">
      <div onclick="toggleAbsOverview()" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none">
        <div style="font-size:14px;font-weight:800;color:#1F2937">🗓️ Abwesenheiten <span style="background:#F59E0B;color:#fff;font-size:11px;padding:2px 8px;border-radius:10px;margin-left:4px">${upcomingAbs.length}</span></div>
        <i id="absOverviewChevron" class="fas fa-chevron-${window._absOverviewOpen===false?'down':'up'}" style="color:#9CA3AF;font-size:13px;transition:transform .2s"></i>
      </div>
      <div id="absOverviewBody" style="margin-top:${window._absOverviewOpen===false?'0':'10px'};overflow:hidden;max-height:${window._absOverviewOpen===false?'0':'2000px'};transition:max-height .3s ease,margin-top .3s ease">
        ${absSection}
      </div>
    </div>
    ${sorted.map(p => `
    <div class="card" style="padding:12px;display:flex;align-items:center;gap:12px">
      <div style="position:relative;cursor:pointer;flex-shrink:0" onclick="editPlayer('${p.id}')">
        ${p.photo ? `<img src="${p.photo}" style="width:52px;height:52px;border-radius:50%;object-fit:cover">` :
          `<div class="avatar-lg">${(p.name||'?')[0].toUpperCase()}</div>`}

}

function previewPhoto(input, previewId, dataId) {
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    compressImage(e.target.result, 400, 0.8, data => {
      const prev = document.getElementById(previewId);
      if(prev) prev.innerHTML = `<img src="${data}" style="width:100%;height:100%;object-fit:cover">`;
      const di = document.getElementById(dataId);
      if(di) di.value = data;
    });
  };
  reader.readAsDataURL(file);
}

function regeneratePin(id) {
  const usedPins = new Set(STATE.players.map(p => String(p.pin)).filter(Boolean));
  let pin;
  do { pin = String(Math.floor(1000 + Math.random() * 9000)); } while (usedPins.has(pin));
  db.ref('/players/' + id).update({ pin });
  showToast(`🔑 Neuer PIN: ${pin}`);
  editPlayer(id);
}

function deletePlayer(id) {
  if(!confirm('Spieler wirklich löschen? Alle Zu-/Absagen werden ebenfalls entfernt.')) return;
  // Spieler löschen
  db.ref('/players/' + id).remove();
  // Attendances aus allen Trainings entfernen
  STATE.trainings.forEach(t => {
    if(t.attendances && t.attendances[id] !== undefined) {
      db.ref('/trainings/' + t.id + '/attendances/' + id).remove();
    }
  });
  // Squad-Einträge aus allen Spielen entfernen
  STATE.games.forEach(g => {
    if(g.squad && g.squad[id] !== undefined) {
      db.ref('/games/' + g.id + '/squad/' + id).remove();
    }
  });
  // Parent-Verknüpfung in Firebase entfernen
  db.ref('/parentLinks').orderByValue().equalTo(id).once('value', snap => {
    snap.forEach(child => child.ref.remove());
  });
}

function trainingDateLabel(dateStr) {
  if(!dateStr) return '';
  const d = new Date(dateStr + 'T12:00:00');
  const days = ['So','Mo','Di','Mi','Do','Fr','Sa'];
  const months = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  return days[d.getDay()] + ', ' + d.getDate() + '. ' + months[d.getMonth()];
}

    <div style="font-size:18px;font-weight:700;margin-bottom:12px">Training bearbeiten</div>
    ${seriesNote}
    ${scope === 'single' ? `<div style="font-size:12px;color:#6B7280;margin-bottom:4px;font-weight:600">Datum</div>
    <input id="etDate" class="input-field" type="date" value="${t.date||''}" style="margin-bottom:10px">` : `<input id="etDate" type="hidden" value="${t.date||''}">`}

}

function saveTraining() {
  const isSerie = document.getElementById('tSerieFields')?.style.display !== 'none';
  const time = document.getElementById('tTime')?.value || '';
  const timeTo = document.getElementById('tTimeTo')?.value || '';
  const location = document.getElementById('tLocation')?.value.trim() || '';
  const notes = document.getElementById('tNotes')?.value.trim() || '';
  const attendances = {};
  STATE.players.forEach(p => { attendances[p.id] = 'open'; });

  if (isSerie) {
    const wochentag = parseInt(document.getElementById('tWochentag')?.value);
    const serieStart = document.getElementById('tSerieStart')?.value;
    const serieEnd = document.getElementById('tSerieEnd')?.value;
    if (!serieStart || !serieEnd) { alert('Start- und Enddatum eingeben'); return; }
    if (serieStart > serieEnd) { alert('Startdatum muss vor Enddatum liegen'); return; }

    const dates = [];
    const cur = new Date(serieStart);
    const end = new Date(serieEnd);
    // Zum ersten passenden Wochentag springen
    while (cur.getDay() !== wochentag) cur.setDate(cur.getDate() + 1);
    while (cur <= end) {
      dates.push(cur.toISOString().slice(0, 10));
      cur.setDate(cur.getDate() + 7);
    }
    if (dates.length === 0) { alert('Kein passender Wochentag im gewählten Zeitraum'); return; }
    if (dates.length > 52) { alert('Maximal 52 Termine pro Serie'); return; }

    const seriesId = 'serie_' + Date.now();
    dates.forEach(date => {
      db.ref('/trainings').push({ date, time, timeTo, location, notes, attendances, actual:{}, seriesId, createdAt: Date.now() });
    });
    notifyAll('🏃 Neue Trainingsserie!', dates.length + ' Termine · ' + time + (timeTo?' - '+timeTo:'') + ' Uhr · ' + location, false, 'termine');
    closeModal();
    alert('✅ ' + dates.length + ' Trainingstermine erstellt!');
  } else {
    const date = document.getElementById('tDate')?.value;
    if (!date) { alert('Datum eingeben'); return; }
    notifyAll('🏃 Neues Training!', date + ' · ' + time + (timeTo?' - '+timeTo:'') + ' Uhr · ' + location, false, 'termine');
    db.ref('/trainings').push({ date, time, timeTo, location, notes, attendances, actual:{}, createdAt: Date.now() });
    closeModal();
  }
}

function formatTreffpunkt(val) {
  if (!val) return '';
  val = val.trim();
  // "10" → "10:00 Uhr", "10:30" → "10:30 Uhr", already has "Uhr" → keep
  if (/^\d{1,2}$/.test(val)) return val.padStart(2,'0') + ':00 Uhr';
  if (/^\d{1,2}:\d{2}$/.test(val)) return val + ' Uhr';
  return val;
}

// ---- ABWESENHEITEN ----
function renderAbsenceSection() {
  const pid = getProfile()?.playerId;
  if(!pid) return '';
  const player = STATE.players.find(p => p.id === pid);
  const myAbsences = STATE.absences
    .filter(a => a.playerId === pid)
    .sort((a,b) => a.fromDate.localeCompare(b.fromDate));
  const today = new Date().toISOString().slice(0,10);
  const upcoming = myAbsences.filter(a => (a.toDate || a.fromDate) >= today);
  const past = myAbsences.filter(a => (a.toDate || a.fromDate) < today);

  const fmtAbsDate = d => new Date(d+'T12:00:00').toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});

  const absRows = (list) => list.map(a => {
    const sameDay = !a.toDate || a.fromDate === a.toDate;
    const dateLabel = sameDay ? fmtAbsDate(a.fromDate) : `${fmtAbsDate(a.fromDate)} – ${fmtAbsDate(a.toDate)}`;
    const label = ABSENCE_LABELS[a.reason] || '📋 Abwesend';
    // Betroffene Termine zählen
    const affTrainings = STATE.trainings.filter(t => t.date >= a.fromDate && t.date <= (a.toDate||a.fromDate)).length;
    const affGames = STATE.games.filter(g => g.date >= a.fromDate && g.date <= (a.toDate||a.fromDate)).length;
    const affected = [affTrainings ? `${affTrainings} Training${affTrainings>1?'s':''}` : '', affGames ? `${affGames} Spiel${affGames>1?'e':''}` : ''].filter(Boolean).join(', ');
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px;background:#F9FAFB;border-radius:10px;margin-bottom:8px">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:700;color:#1F2937">${label}</div>
        <div style="font-size:12px;color:#6B7280">${dateLabel}</div>
        ${a.note ? `<div style="font-size:11px;color:#9CA3AF;margin-top:2px">${escHtml(a.note)}</div>` : ''}
        ${affected ? `<div style="font-size:11px;color:#EF4444;font-weight:600;margin-top:2px">Betrifft: ${affected}</div>` : ''}
      </div>
      <button onclick="deleteAbsence('${a.id}')" style="width:32px;height:32px;border-radius:8px;border:none;background:#FEE2E2;color:#991B1B;cursor:pointer;font-size:14px;flex-shrink:0">🗑</button>
    </div>`;
  }).join('');

  return `<div style="margin-top:20px;border-top:1px solid #F3F4F6;padding-top:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div style="font-size:15px;font-weight:800;color:#1F2937">🗓️ Meine Abwesenheiten</div>
      <button onclick="addAbsenceModal()" style="background:#0A2540;color:#fff;border:none;border-radius:10px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer">+ Eintragen</button>
    </div>
    ${upcoming.length ? absRows(upcoming) : `<div style="text-align:center;padding:16px;color:#9CA3AF;font-size:13px;background:#F9FAFB;border-radius:10px">Keine bevorstehenden Abwesenheiten</div>`}
    ${past.length ? `<div style="font-size:11px;color:#9CA3AF;font-weight:600;margin:12px 0 6px;text-transform:uppercase;letter-spacing:.06em">Vergangen</div>${absRows(past)}` : ''}
  </div>`;
}

function isAbsent(playerId, dateStr) {
  return STATE.absences.some(a => a.playerId === playerId && dateStr >= a.fromDate && dateStr <= (a.toDate || a.fromDate));
}
function getAbsence(playerId, dateStr) {
  return STATE.absences.find(a => a.playerId === playerId && dateStr >= a.fromDate && dateStr <= (a.toDate || a.fromDate));
}
const ABSENCE_LABELS = { krank:'🤒 Krank', urlaub:'🏖️ Urlaub', sonstige:'📋 Abwesend' };

function addAbsenceModal() {
  const pid = getProfile()?.playerId;
  if(!pid) { alert('Bitte erst Profil einrichten.'); return; }
  const player = STATE.players.find(p => p.id === pid);
  const today = new Date().toISOString().slice(0,10);
  showModal(`<div class="modal-handle"></div>
    <div style="font-size:17px;font-weight:800;margin-bottom:4px">Abwesenheit melden</div>
    <div style="font-size:13px;color:#6B7280;margin-bottom:16px">für ${escHtml(player?.name||'?')}</div>
    <label style="font-size:12px;color:#6B7280;font-weight:600;display:block;margin-bottom:4px">Grund</label>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <button onclick="selectAbsReason(this,'krank')" class="abs-reason-btn" style="flex:1;padding:10px 4px;border-radius:10px;border:2px solid #E5E7EB;background:#fff;font-size:13px;font-weight:700;cursor:pointer">🤒 Krank</button>
      <button onclick="selectAbsReason(this,'urlaub')" class="abs-reason-btn" style="flex:1;padding:10px 4px;border-radius:10px;border:2px solid #E5E7EB;background:#fff;font-size:13px;font-weight:700;cursor:pointer">🏖️ Urlaub</button>
      <button onclick="selectAbsReason(this,'sonstige')" class="abs-reason-btn" style="flex:1;padding:10px 4px;border-radius:10px;border:2px solid #E5E7EB;background:#fff;font-size:13px;font-weight:700;cursor:pointer">📋 Sonstige</button>
    </div>
    <input type="hidden" id="absReason" value="krank">
    <div style="display:flex;gap:10px;margin-bottom:10px">
      <div style="flex:1">
        <label style="font-size:12px;color:#6B7280;font-weight:600;display:block;margin-bottom:4px">Von</label>
        <input id="absFrom" class="input-field" type="date" value="${today}">
      </div>
      <div style="flex:1">
        <label style="font-size:12px;color:#6B7280;font-weight:600;display:block;margin-bottom:4px">Bis (optional)</label>
        <input id="absTo" class="input-field" type="date" value="${today}">
      </div>
    </div>
    <input id="absNote" class="input-field" placeholder="Notiz (optional)" style="margin-bottom:16px">
    <button class="btn-primary" onclick="saveAbsence('${pid}')">Abwesenheit speichern</button>`);
  // ersten Button aktiv markieren
  setTimeout(() => { document.querySelector('.abs-reason-btn')?.click(); }, 50);

function selectAbsReason(btn, val) {
  document.getElementById('absReason').value = val;
  document.querySelectorAll('.abs-reason-btn').forEach(b => {
    b.style.background = '#fff';
    b.style.borderColor = '#E5E7EB';
    b.style.color = '#374151';
  });
  btn.style.background = '#0A2540';
  btn.style.borderColor = '#0A2540';
  btn.style.color = '#fff';
}

function saveAbsence(pid) {
  const reason  = document.getElementById('absReason')?.value || 'krank';
  const fromDate = document.getElementById('absFrom')?.value;
  const toDate   = document.getElementById('absTo')?.value || fromDate;
  const note     = document.getElementById('absNote')?.value.trim() || '';
  if(!fromDate) { alert('Bitte Datum eingeben'); return; }
  db.ref('/absences').push({ playerId: pid, fromDate, toDate, reason, note, createdAt: Date.now() });
  closeModal();
}

function deleteAbsence(id) {
  if(!confirm('Abwesenheit löschen?')) return;
  db.ref('/absences/' + id).remove();
}

// ---- STATISTIK TAB ----
function renderStatistikTab(c) {
  const totalT = STATE.trainings.length;
  const totalG = STATE.games.length;
  const totalP = STATE.players.length;
  if(!totalP) { c.innerHTML = `<div style="text-align:center;padding:40px;color:#9CA3AF"><div style="font-size:40px;margin-bottom:8px">📊</div><div>Noch keine Spieler</div></div>`; return; }

  const stats = [...STATE.players].sort((a,b)=>(parseInt(a.number,10)||999)-(parseInt(b.number,10)||999)).map(p => {
    const yesCount = STATE.trainings.filter(t => t.attendances?.[p.id] === 'yes').length;
    const noCount  = STATE.trainings.filter(t => t.attendances?.[p.id] === 'no').length;
    const gamesInSquad = STATE.games.filter(g => Object.keys(g.squad||{}).filter(k=>g.squad[k]).includes(p.id));
    const avgPctP = totalT ? Math.round(yesCount / totalT * 100) : 0;
    return { ...p, yesCount, noCount, gamesInSquad, avgPctP };
  });

  const avgPct = Math.round(stats.reduce((s,p)=>s+p.avgPctP,0)/totalP);

  let html = `
    <div style="background:linear-gradient(135deg,#0A2540,#1e3a5c);border-radius:16px;padding:16px;margin-bottom:14px;color:#fff">
      <div style="font-size:11px;font-weight:700;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px">Team Übersicht</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
        ${[
          [totalP,      'Spieler',   'fas fa-users'],
          [totalT,      'Trainings', 'fas fa-running'],
          [totalG,      'Spiele',    'fas fa-futbol'],
          [avgPct+'%',  'Ø Zusagen', 'fas fa-check']
        ].map(([v,l,ic])=>`
          <div style="background:rgba(255,255,255,.1);border-radius:10px;padding:10px 6px;text-align:center">
            <i class="${ic}" style="font-size:14px;opacity:.6;display:block;margin-bottom:4px"></i>
            <div style="font-size:18px;font-weight:900;line-height:1">${v}</div>
            <div style="font-size:9px;opacity:.6;margin-top:2px;text-transform:uppercase;letter-spacing:.04em">${l}</div>
          </div>`).join('')}
      </div>
    </div>`;

  html += stats.map(p => {
    return `<div class="card" style="padding:14px;margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #F3F4F6">
        <div style="position:relative;flex-shrink:0">
          <div style="width:52px;height:52px;border-radius:50%;overflow:hidden;border:2px solid #E5E7EB">
            ${p.photo?`<img src="${p.photo}" style="width:100%;height:100%;object-fit:cover">`:`<div style="width:100%;height:100%;background:#0A2540;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff">${(p.name||'?')[0].toUpperCase()}</div>`}
          </div>
          <div style="position:absolute;bottom:-2px;right:-2px;background:#0A2540;color:#fff;font-size:9px;font-weight:800;padding:2px 5px;border-radius:6px">${p.number||'?'}</div>
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:16px;font-weight:800;color:#1F2937">${escHtml(p.name||'')}</div>
          <div style="font-size:12px;color:#9CA3AF;margin-top:2px">#${p.number||'?'}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <span style="font-size:13px;color:#6B7280;width:130px;flex-shrink:0">🏃 Training</span>
        <span style="font-size:13px;font-weight:700;color:#065F46;background:#D1FAE5;padding:3px 10px;border-radius:20px">✅ ${p.yesCount} Zusagen</span>
        <span style="font-size:13px;font-weight:700;color:#991B1B;background:#FEE2E2;padding:3px 10px;border-radius:20px">❌ ${p.noCount} Absagen</span>
      </div>
      <div style="display:flex;align-items:flex-start;gap:8px">
        <span style="font-size:13px;color:#6B7280;width:130px;flex-shrink:0;padding-top:2px">⚽ Spiele im Kader</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:700;color:#1F2937;margin-bottom:6px">${p.gamesInSquad.length} von ${totalG} Spielen</div>
          ${p.gamesInSquad.length > 0
            ? `<div style="display:flex;flex-wrap:wrap;gap:5px">
                ${p.gamesInSquad.map(g=>`<div style="background:#EEF2FF;border-radius:8px;padding:4px 8px;font-size:11px;font-weight:600;color:#3730A3">${escHtml(g.opponent||'?')}${g.result?` · <span style="font-weight:800;color:#0A2540">${escHtml(g.result)}</span>`:''}</div>`).join('')}
              </div>`
            : `<div style="font-size:12px;color:#D1D5DB;font-style:italic">Noch kein Spiel im Kader</div>`}
        </div>
      </div>
    </div>`;
  }).join('');

  c.innerHTML = html;
}

function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1F2937;color:#fff;padding:12px 20px;border-radius:20px;font-size:14px;font-weight:600;z-index:9999;max-width:80%;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.3)';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function toggleProfileLock() {
  const locked = STATE.config.profileSwitchLocked === true;
  db.ref('/config/profileSwitchLocked').set(!locked);
}

function changePin() {
  const p1 = document.getElementById('newPin1')?.value.trim();
  const p2 = document.getElementById('newPin2')?.value.trim();
  if(!p1 || p1 !== p2){ alert('PINs stimmen nicht überein'); return; }
  if(p1.length < 4){ alert('Mindestens 4 Zeichen'); return; }
  db.ref('/config/trainerPin').set(p1);
  alert('PIN gespeichert!');
}

function uploadLogo(input) {
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    compressImage(e.target.result, 300, 0.85, data => {
      db.ref('/config/logo').set(data);
    });
  };
  reader.readAsDataURL(file);
  input.value = '';
}

function exportData() {
  const data = {
    players: STATE.players, trainings: STATE.trainings,
    games: STATE.games, exportedAt: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'fc-niksar-export-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}

// ---- IMAGE COMPRESSION ----
function compressImage(dataUrl, maxW, quality, cb) {
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    let w = img.width, h = img.height;
    if(w > maxW){ h = Math.round(h * maxW / w); w = maxW; }
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    cb(canvas.toDataURL('image/jpeg', quality));
  };
  img.src = dataUrl;
}

function urlBase64ToUint8Array(b64){const pad='='.repeat((4-b64.length%4)%4);const raw=atob((b64+pad).replace(/-/g,'+').replace(/_/g,'/'));return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));}

async function subscribeToPush(){if(!('PushManager'in window)){alert('Push-Benachrichtigungen werden auf diesem Geraet nicht unterstuetzt.');return;}const p=await Notification.requestPermission();if(p!=='granted'){alert('Bitte erlaube Benachrichtigungen in den Einstellungen.');return;}try{const r=await navigator.serviceWorker.ready;const old=await r.pushManager.getSubscription();if(old)await old.unsubscribe();const s=await r.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlBase64ToUint8Array(VAPID_PUBLIC_KEY)});const k=btoa(s.endpoint).replace(/[^a-zA-Z0-9]/g,'').slice(-28);await db.ref('/pushSubscriptions/'+k).set(s.toJSON());LSset('pushEnabled','true');LSset('myPushKey',k);alert('✅ Benachrichtigungen aktiviert!');if(document.getElementById('pushBtn')){document.getElementById('pushBtn').textContent='✅ Aktiviert';document.getElementById('pushBtn').style.background='#10B981';document.getElementById('pushBtn').disabled=true;}}catch(e){alert('FEHLER bei Schritt: '+e.message);}}
async function resubscribePush(){
  try {
    const r = await navigator.serviceWorker.ready;
    // Alte Subscription löschen
    const old = await r.pushManager.getSubscription();
    if (old) {
      const oldK = btoa(old.endpoint).replace(/[^a-zA-Z0-9]/g,'').slice(-28);
      await db.ref('/pushSubscriptions/'+oldK).remove();
      await old.unsubscribe();
    }
    // Neue Subscription erstellen
    const s = await r.pushManager.subscribe({userVisibleOnly:true, applicationServerKey:urlBase64ToUint8Array(VAPID_PUBLIC_KEY)});
    const k = btoa(s.endpoint).replace(/[^a-zA-Z0-9]/g,'').slice(-28);
    await db.ref('/pushSubscriptions/'+k).set(s.toJSON());
    LSset('pushEnabled','true');
    LSset('myPushKey',k);
    showToast('✅ Push-Verbindung erneuert!');
  } catch(e) {
    showToast('❌ Fehler: '+e.message);
  }
}
async function unsubscribeFromPush(){try{const r=await navigator.serviceWorker.ready;const s=await r.pushManager.getSubscription();if(s){const k=btoa(s.endpoint).replace(/[^a-zA-Z0-9]/g,'').slice(-28);await db.ref('/pushSubscriptions/'+k).remove();await s.unsubscribe();}LSset('pushEnabled','false');alert('Deaktiviert.');}catch(e){alert('Fehler: '+e.message);}}

// ---- NOTIFICATIONS ----
async function autoSetupPush() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window) || !('Notification' in window)) return;
  try {
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();

    if (sub) {
      // Subscription vorhanden → alle 20 Tage automatisch erneuern
      const lastRenew = parseInt(LS('pushRenewedAt') || '0');
      const twentyDays = 20 * 24 * 60 * 60 * 1000;
      if (lastRenew && Date.now() - lastRenew > twentyDays) {
        // 20 Tage alt → still neue Subscription erstellen
        try {
          const newSub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY) });
          // Neue ist anders als alte → alte aus Firebase löschen
          if (newSub.endpoint !== sub.endpoint) {
            const oldK = btoa(sub.endpoint).replace(/[^a-zA-Z0-9]/g,'').slice(-28);
            await db.ref('/pushSubscriptions/' + oldK).remove();
          }
          sub = newSub;
          LSset('pushRenewedAt', String(Date.now()));
        } catch(e) {
          // Fehlgeschlagen → in 1 Tag nochmal versuchen
          LSset('pushRenewedAt', String(Date.now() - (19 * 24 * 60 * 60 * 1000)));
        }
      }
      const k = btoa(sub.endpoint).replace(/[^a-zA-Z0-9]/g,'').slice(-28);
      LSset('myPushKey', k);
      LSset('pushEnabled', 'true');
      LSset('pushRenewedAt', LS('pushRenewedAt') || String(Date.now()));
      await db.ref('/pushSubscriptions/' + k).set(sub.toJSON());
      return;
    }

    // Keine Subscription → Permission prüfen
    if (Notification.permission === 'granted') {
      // Direkt still abonnieren
      sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY) });
      const k = btoa(sub.endpoint).replace(/[^a-zA-Z0-9]/g,'').slice(-28);
      await db.ref('/pushSubscriptions/' + k).set(sub.toJSON());
      LSset('pushEnabled', 'true');
      LSset('myPushKey', k);
      LSset('pushRenewedAt', String(Date.now()));
    } else if (Notification.permission === 'default' && LS('pushEnabled') !== 'false') {
      // Ersten Start: Popup nach 2s anzeigen
      setTimeout(() => {
        const el = document.createElement('div');
        el.id = 'notifPopup';
        el.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:999;display:flex;align-items:center;justify-content:center;padding:24px';
        el.innerHTML = `<div style="background:#fff;border-radius:24px;padding:28px 24px;max-width:320px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)">
          <div style="font-size:52px;margin-bottom:12px">&#128276;</div>
          <div style="font-size:20px;font-weight:800;color:#0A2540;margin-bottom:8px">Benachrichtigungen</div>
          <div style="font-size:14px;color:#6B7280;margin-bottom:24px;line-height:1.5">Erhalte sofort eine Nachricht bei neuen Trainings, Spielen und Abstimmungen.</div>
          <button onclick="document.getElementById('notifPopup')?.remove();subscribeToPush()" style="width:100%;background:#0A2540;color:#fff;border:none;padding:14px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px">Ja, aktivieren &#128276;</button>
          <button onclick="LSset('pushEnabled','false');document.getElementById('notifPopup').remove()" style="width:100%;background:#f3f4f6;color:#6B7280;border:none;padding:12px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer">Nein danke</button>
        </div>`;
        document.body.appendChild(el);
      }, 2000);
    }
  } catch(e) {}
}
